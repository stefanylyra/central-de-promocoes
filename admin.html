<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin - Central de Promoções</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    margin: 10px 0;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    margin-top: 8px;
    background: #38bdf8;
    color: black;
    font-weight: bold;
}

button:hover {
    opacity: 0.8;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
}

.produto {
    background: #0b1220;
    padding: 10px;
    border-radius: 10px;
}

img {
    width: 100%;
    border-radius: 10px;
}
.topbar {
    display:flex;
    justify-content: space-between;
    align-items:center;
}
.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<!-- 🔐 LOGIN -->
<div id="loginBox" class="card">
    <h2>🔐 Admin Login</h2>
    <input id="email" placeholder="Email admin">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
</div>

<!-- 📊 DASHBOARD -->
<div id="dashboard" class="hidden">

    <div class="topbar">
        <h2>📊 Admin Panel</h2>
        <button onclick="logout()">Sair</button>
    </div>

    <!-- ➕ PRODUTO -->
    <div class="card">
        <h3>➕ Novo Produto</h3>

        <input id="nome" placeholder="Nome produto">
        <input id="precoAntigo" placeholder="Preço antigo">
        <input id="precoNovo" placeholder="Preço novo">

        <select id="categoria">
            <option value="roupas-masculinas">👕 Masculinas</option>
            <option value="roupas-femininas">👗 Femininas</option>
            <option value="plus-size">👚 Plus Size</option>
            <option value="relogios">⌚ Relógios</option>
            <option value="mae-bebe">👶 Mãe & Bebê</option>
            <option value="viagens-bagagens">🧳 Viagens</option>
            <option value="fones">🎧 Fones</option>
            <option value="bolsas-masculinas">🎒 Bolsas Masc</option>
            <option value="bolsas-femininas">👛 Bolsas Fem</option>
            <option value="limpeza">🧼 Limpeza</option>
            <option value="brinquedos">🧸 Brinquedos</option>
            <option value="acessorios">💎 Acessórios</option>
            <option value="pets">🐶 Pets</option>
            <option value="sapatos">👟 Sapatos</option>
            <option value="casa-construcao">🏡 Casa</option>
            <option value="beleza">💄 Beleza</option>
            <option value="papelaria">✏️ Papelaria</option>
        </select>

        <select id="loja">
                <option value="amazon">Amazon</option>
                <option value="shopee">Shopee</option>
                <option value="mercado-livre">Mercado Livre</option>
                <option value="shein">Shein</option>
                <option value="aliexpress">AliExpress</option>
            </select>
 <input type="file" id="imgFile">
        <input id="link" placeholder="Link afiliado">

        <button onclick="salvarProduto()">Salvar</button>
    </div>

    <!-- ➕ ADMIN -->
    <div class="card">
        <h3>👑 Adicionar novo admin</h3>
        <input id="newAdminEmail" placeholder="Email do novo admin">
        <button onclick="addAdmin()">Adicionar admin</button>
    </div>

    <!-- 📦 LISTA -->
    <div class="card">
        <h3>📦 Produtos</h3>
        <div class="grid" id="lista"></div>
    </div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCydy0v27JxNvKBW3aqFa3Uel8Slkdtcx4",
  authDomain: "central-promocoes.firebaseapp.com",
  projectId: "central-promocoes",
  storageBucket: "central-promocoes.firebasestorage.app",
  messagingSenderId: "396856047778",
  appId: "1:396856047778:web:8608a6b95f26f160d27ffb"
};
    
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let editId = null;

// 👑 CHECK ADMIN
async function isAdmin(email){
    const snap = await db.collection("admins").doc(email).get();
    return snap.exists;
}

// 🔐 LOGIN
async function login(){
    try {
        const res = await auth.signInWithEmailAndPassword(email.value, senha.value);

        const ok = await isAdmin(res.user.email);

        if(!ok){
            alert("Acesso negado (não é admin)");
            await auth.signOut();
            return;
        }

        showDashboard();

    } catch(e){
        alert("Erro login");
    }
}

function showDashboard(){
    loginBox.classList.add("hidden");
    dashboard.classList.remove("hidden");
}

// 🚪 LOGOUT
function logout(){
    auth.signOut();
    location.reload();
}

// 🔄 AUTH STATE
auth.onAuthStateChanged(async user=>{
    if(user){
        const ok = await isAdmin(user.email);
        if(ok) showDashboard();
        else auth.signOut();
    }
});

// 📤 UPLOAD IMG
async function uploadImage(file){
    const ref = storage.ref("produtos/" + Date.now());
    await ref.put(file);
    return await ref.getDownloadURL();
}

// 💾 SALVAR PRODUTO
async function salvarProduto(){

    let imgUrl = "";

    if(imgFile.files[0]){
        imgUrl = await uploadImage(imgFile.files[0]);
    }

    const produto = {
        nome: nome.value,
        precoAntigo: precoAntigo.value,
        precoNovo: precoNovo.value,
        img: imgUrl,
        link: link.value,
        categoria: categoria.value,
        loja: loja.value,
        createdAt: Date.now()
    };

    if(editId){
        await db.collection("produtos").doc(editId).update(produto);
        editId = null;
    } else {
        await db.collection("produtos").add(produto);
    }

    limpar();
}

// 🧹 LIMPAR
function limpar(){
    nome.value = "";
    precoAntigo.value = "";
    precoNovo.value = "";
    link.value = "";
    imgFile.value = "";
}

// 📦 LISTA
db.collection("produtos").orderBy("createdAt","desc")
.onSnapshot(snap=>{
    lista.innerHTML = "";

    snap.forEach(doc=>{
        const p = doc.data();

        lista.innerHTML += `
        <div class="produto">
            <img src="${p.img}">
            <b>${p.nome}</b><br>
            💰 ${p.precoNovo}<br>
            🏷 ${p.categoria}<br>

            <button onclick="editar('${doc.id}', '${p.nome}', '${p.precoAntigo}', '${p.precoNovo}', '${p.link}', '${p.categoria}', '${p.loja}')">Editar</button>
            <button onclick="deletar('${doc.id}')">Excluir</button>
        </div>
        `;
    });
});

// ✏️ EDITAR
function editar(id,nomeV,pa,pn,linkV,cat,lojaV){
    nome.value = nomeV;
    precoAntigo.value = pa;
    precoNovo.value = pn;
    link.value = linkV;
    categoria.value = cat;
    loja.value = lojaV;
    editId = id;
}

// 🗑 DELETE
function deletar(id){
    db.collection("produtos").doc(id).delete();
}

// 👑 ADD ADMIN
function addAdmin(){
    const email = newAdminEmail.value.trim();
    if(!email) return;

    db.collection("admins").doc(email).set({
        role: "admin",
        createdAt: Date.now()
    });

    alert("Admin adicionado!");
    newAdminEmail.value = "";
}

</script>

</body>
</html>
