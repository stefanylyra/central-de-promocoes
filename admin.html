<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin Final Boss</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

/* LOGIN */
#login {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    display:flex;
    align-items:center;
    justify-content:center;
}

.box{
    background:#111827;
    padding:20px;
    border-radius:12px;
    width:320px;
}

/* LAYOUT */
header{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#111827;
}

.container{
    padding:20px;
}

/* CARD */
.card{
    background:#1f2937;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

/* PRODUTO */
.produto{
    background:#111827;
    padding:10px;
    border-radius:10px;
}

.produto img{
    width:100%;
    border-radius:8px;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    display:none;
    align-items:center;
    justify-content:center;
}

.modal-box{
    background:#111827;
    padding:20px;
    width:400px;
    border-radius:10px;
}
input,select,button{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
}
button{
    border:none;
    cursor:pointer;
    border-radius:6px;
}
.btn{background:#22c55e}
.danger{background:#ef4444;color:white}
.blue{background:#3b82f6}
</style>
</head>

<body>

<!-- 🔐 LOGIN OCULTO -->
<div id="login">
    <div class="box">
        <h3>Admin Login</h3>
        <input id="email" placeholder="Email">
        <input id="senha" type="password" placeholder="Senha">
        <button class="btn" onclick="login()">Entrar</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="app" style="display:none;">

<header>
    <h3>🔥 Final Boss Admin</h3>
    <div>
        <button class="blue" onclick="openUserModal()">+ Usuário</button>
        <button class="danger" onclick="logout()">Sair</button>
    </div>
</header>

<div class="container">

<!-- PRODUTO -->
<div class="card">
    <h3>➕ Produto</h3>

    <input id="pid" placeholder="ID (ou deixe vazio)">
    <input id="nome" placeholder="Nome">
    <input id="img" placeholder="Imagem URL">
    <input id="link" placeholder="Link afiliado">

    <input id="pAntigo" placeholder="Preço antigo">
    <input id="pNovo" placeholder="Preço novo">

    <select id="categoria">
            <option value="roupas-masculinas">👕 Masculinas</option>
            <option value="roupas-femininas">👗 Femininas</option>
            <option value="plus-size">👚 Plus Size</option>
            <option value="relogios">⌚ Relógios</option>
            <option value="mae-bebe">👶 Mãe & Bebê</option>
            <option value="viagens-bagagens">🧳 Viagens</option>
            <option value="fones">🎧 Fones</option>
            <option value="bolsas-masculinas">🎒 Bolsas Masc</option>
            <option value="bolsas-femininas">👛 Bolsas Fem</option>
            <option value="limpeza">🧼 Limpeza</option>
            <option value="brinquedos">🧸 Brinquedos</option>
            <option value="acessorios">💎 Acessórios</option>
            <option value="pets">🐶 Pets</option>
            <option value="sapatos">👟 Sapatos</option>
            <option value="casa-construcao">🏡 Casa</option>
            <option value="beleza">💄 Beleza</option>
            <option value="papelaria">✏️ Papelaria</option>
        </select>

        <select id="loja">
                <option value="amazon">Amazon</option>
                <option value="shopee">Shopee</option>
                <option value="mercado-livre">Mercado Livre</option>
                <option value="shein">Shein</option>
                <option value="aliexpress">AliExpress</option>
            </select>
  <button class="btn" onclick="salvarProduto()">Salvar</button>
</div>

<!-- LISTA -->
<h3>📦 Produtos</h3>
<div class="grid" id="lista"></div>

</div>
</div>

<!-- 👤 MODAL USUÁRIOS -->
<div class="modal" id="userModal">
    <div class="modal-box">
        <h3>Adicionar Usuário</h3>

        <input id="newEmail" placeholder="Email">
        <select id="role">
            <option value="staff">Funcionário</option>
            <option value="admin">Admin</option>
        </select>

        <button class="btn" onclick="addUser()">Salvar usuário</button>
        <button class="danger" onclick="closeUserModal()">Fechar</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
  apiKey: "SUA_API",
  authDomain: "SEU.firebaseapp.com",
  projectId: "SEU"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* LOGIN */
function login(){
    auth.signInWithEmailAndPassword(email.value, senha.value)
    .then(u=>{
        checkUser(u.user.uid);
    })
}

/* CHECAR ROLE */
function checkUser(uid){
    db.collection("users").doc(uid).get().then(doc=>{
        if(!doc.exists){
            alert("Sem permissão");
            auth.signOut();
            return;
        }
        login.style.display="none";
        app.style.display="block";
    });
}

/* LOGOUT */
function logout(){
    auth.signOut();
    location.reload();
}

/* PRODUTO */
function salvarProduto(){

    const id = pid.value || Date.now().toString();

    db.collection("produtos").doc(id).set({
        id,
        nome:nome.value,
        img:img.value,
        link:link.value,
        precoAntigo:pAntigo.value,
        precoNovo:pNovo.value,
        categoria:categoria.value,
        loja:loja.value
    });

    alert("Salvo!");
}

/* LISTA */
db.collection("produtos").onSnapshot(s=>{
    lista.innerHTML="";
    s.forEach(d=>{
        const p=d.data();
        lista.innerHTML+=`
        <div class="produto">
            <img src="${p.img}">
            <h4>${p.nome}</h4>
            <p>R$ ${p.precoNovo}</p>
        </div>`;
    });
});

/* USERS */
function openUserModal(){
    userModal.style.display="flex";
}

function closeUserModal(){
    userModal.style.display="none";
}

/* ADD USER */
function addUser(){
    const email = newEmail.value;

    // OBS: só funciona se você já tiver lógica de backend/Cloud Function
    db.collection("users").add({
        email,
        role: role.value
    });

    alert("Usuário criado (configure auth manualmente no Firebase)");
}
</script>

</body>
</html>
