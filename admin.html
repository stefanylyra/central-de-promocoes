<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}

button {
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
}

.produto {
    background: #eee;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}
</style>

</head>
<body>

<div class="container">

<h2>🛠 Painel Admin de Produtos</h2>

<input id="nome" placeholder="Nome do produto">
<input id="preco" placeholder="Preço">
<input id="precoAntigo" placeholder="Preço antigo">
<input id="imagem" placeholder="URL da imagem">
<input id="link" placeholder="Link afiliado">

<select id="categoria">
    <option value="roupas-masculinas">👕 Roupas Masculinas</option>
    <option value="roupas-femininas">👗 Roupas Femininas</option>
    <option value="plus-size">👚 Plus Size</option>
    <option value="relogios">⌚ Relógios</option>
    <option value="mae-bebe">👶 Mãe & Bebê</option>
    <option value="viagens-bagagens">🧳 Viagem</option>
    <option value="fones">🎧 Fones</option>
    <option value="bolsas-masculinas">🎒 Bolsas Masculinas</option>
    <option value="bolsas-femininas">👝 Bolsas Femininas</option>
    <option value="limpeza">🧼 Limpeza</option>
    <option value="brinquedos">🧸 Brinquedos</option>
    <option value="acessorios">💎 Acessórios</option>
    <option value="pets">🐶 Pets</option>
    <option value="sapatos">👟 Sapatos</option>
    <option value="casa-construcao">🏡 Casa e construção</option>
    <option value="beleza">💄 Beleza</option>
    <option value="papelaria">✏️ Papelaria</option>
</select>

<button onclick="salvarProduto()">💾 Salvar Produto</button>

<hr>

<h3>📦 Produtos cadastrados</h3>
<div id="lista"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// 🔥 SUA CONFIG FIREBASE AQUI
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJETO",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let editandoId = null;

// 🟢 SALVAR / EDITAR
function salvarProduto() {

    const produto = {
        nome: nome.value,
        preco: preco.value,
        precoAntigo: precoAntigo.value,
        imagem: imagem.value,
        link: link.value,
        categoria: categoria.value
    };

    if(editandoId){
        db.collection("produtos").doc(editandoId).update(produto);
        editandoId = null;
    } else {
        db.collection("produtos").add(produto);
    }

    limparCampos();
}

// 🧹 LIMPAR FORM
function limparCampos(){
    nome.value = "";
    preco.value = "";
    precoAntigo.value = "";
    imagem.value = "";
    link.value = "";
}

// 🔥 LISTAGEM EM TEMPO REAL
db.collection("produtos").onSnapshot(snapshot => {

    lista.innerHTML = "";

    snapshot.forEach(doc => {

        const p = doc.data();

        lista.innerHTML += `
        <div class="produto">
            <b>${p.nome}</b><br>
            💰 R$ ${p.preco}<br>
            📂 ${p.categoria}<br>

            <button onclick="editarProduto(
                '${doc.id}',
                '${p.nome}',
                '${p.preco}',
                '${p.precoAntigo}',
                '${p.imagem}',
                '${p.link}',
                '${p.categoria}'
            )">✏️ Editar</button>

            <button onclick="deletarProduto('${doc.id}')">🗑️ Deletar</button>
        </div>
        `;
    });

});

// ✏️ EDITAR
function editarProduto(id, nomeP, precoP, precoAntigoP, imagemP, linkP, categoriaP){

    nome.value = nomeP;
    preco.value = precoP;
    precoAntigo.value = precoAntigoP;
    imagem.value = imagemP;
    link.value = linkP;
    categoria.value = categoriaP;

    editandoId = id;
}

// 🗑️ DELETAR
function deletarProduto(id){
    db.collection("produtos").doc(id).delete();
}

</script>

</body>
</html>
