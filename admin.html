<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin Marketplace Pro</title>

<style>
body { margin:0; font-family:Arial; background:#f4f6fb; }

#login {
    max-width:380px;
    margin:100px auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
}

#admin {
    display:none;
    min-height:100vh;
    display:flex;
}

.sidebar {
    width:220px;
    background:#111;
    color:#fff;
    padding:15px;
}

.sidebar button {
    width:100%;
    margin:5px 0;
    padding:10px;
}

.content {
    flex:1;
    padding:20px;
}

input, select {
    width:100%;
    padding:10px;
    margin:5px 0;
}

button {
    cursor:pointer;
}

.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.card {
    background:#fff;
    padding:10px;
    border-radius:10px;
}

img {
    width:100%;
    border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2>Admin Login</h2>
    <input id="email" placeholder="email">
    <input id="senha" type="password" placeholder="senha">
    <button onclick="login()">Entrar</button>
</div>

<!-- ADMIN -->
<div id="admin">

<div class="sidebar">
    <h3>Admin Panel</h3>
    <button onclick="logout()">Sair</button>
    <hr>
    <button onclick="tab('novo')">➕ Novo Produto</button>
    <button onclick="tab('lista')">📦 Produtos</button>
</div>

<div class="content">

<!-- NOVO -->
<div id="novo">

<h2>Novo Produto</h2>

<input id="nome" placeholder="Nome">
<input id="precoAntigo" placeholder="Preço antigo">
<input id="precoNovo" placeholder="Preço novo">

<select id="categoria">
            <option value="roupas-masculinas">👕 Masculinas</option>
            <option value="roupas-femininas">👗 Femininas</option>
            <option value="plus-size">👚 Plus Size</option>
            <option value="relogios">⌚ Relógios</option>
            <option value="mae-bebe">👶 Mãe & Bebê</option>
            <option value="viagens-bagagens">🧳 Viagens</option>
            <option value="fones">🎧 Fones</option>
            <option value="bolsas-masculinas">🎒 Bolsas Masc</option>
            <option value="bolsas-femininas">👛 Bolsas Fem</option>
            <option value="limpeza">🧼 Limpeza</option>
            <option value="brinquedos">🧸 Brinquedos</option>
            <option value="acessorios">💎 Acessórios</option>
            <option value="pets">🐶 Pets</option>
            <option value="sapatos">👟 Sapatos</option>
            <option value="casa-construcao">🏡 Casa</option>
            <option value="beleza">💄 Beleza</option>
            <option value="papelaria">✏️ Papelaria</option>
        </select>

   <select id="loja">
<option value="shopee">Shopee</option>
<option value="amazon">Amazon</option>
<option value="magazine">Magazine Luiza</option>
<option value="mercado-livre">Mercado Livre</option>
<option value="shein">Shein</option>
<option value="aliexpress">AliExpress</option>
</select>

<input id="imgUrl" placeholder="URL da imagem (obrigatório)">

<input id="link" placeholder="Link afiliado">

<button onclick="salvar()">Salvar Produto</button>

</div>

<!-- LISTA -->
<div id="lista" style="display:none;">
<h2>Produtos</h2>
<div class="grid" id="grid"></div>
</div>

</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
  apiKey: "SUA_API_KEY_REAL",
  authDomain: "central-promocoes.firebaseapp.com",
  projectId: "central-promocoes",
  appId: "1:396856047778:web:8608a6b95f26f160d27ffb"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function login(){
    auth.signInWithEmailAndPassword(email.value, senha.value)
    .catch(() => alert("Erro login"));
}

// LOGOUT
function logout(){
    auth.signOut();
}

// AUTH CHECK
auth.onAuthStateChanged(user => {

    const loginBox = document.getElementById("login");
    const adminBox = document.getElementById("admin");

    if(!user){
        loginBox.style.display = "block";
        adminBox.style.display = "none";
        return;
    }

    if(user.email === "tete1808sd@gmail.com"){
        loginBox.style.display = "none";
        adminBox.style.display = "flex";
    } else {
        alert("Sem permissão");
        auth.signOut();
    }
});

// TAB
function tab(t){
    novo.style.display = t === "novo" ? "block" : "none";
    lista.style.display = t === "lista" ? "block" : "none";
}

// SALVAR PRODUTO
async function salvar(){

    const produto = {
        nome: nome.value,
        precoAntigo: precoAntigo.value,
        precoNovo: precoNovo.value,
        img: imgUrl.value,
        link: link.value,
        categoria: categoria.value,
        loja: loja.value,
        createdAt: Date.now()
    };

    await db.collection("produtos").add(produto);

    alert("Produto salvo!");

    nome.value = "";
    precoAntigo.value = "";
    precoNovo.value = "";
    imgUrl.value = "";
    link.value = "";
}

// LISTAR
db.collection("produtos").onSnapshot(snap => {

    grid.innerHTML = "";

    snap.forEach(doc => {
        const p = doc.data();

        grid.innerHTML += `
        <div class="card">
            <img src="${p.img}">
            <b>${p.nome}</b><br>
            R$ ${p.precoNovo}<br>
            ${p.loja}<br>

            <button onclick="db.collection('produtos').doc('${doc.id}').delete()">
            Excluir
            </button>
        </div>
        `;
    });

});

</script>

</body>
</html>
