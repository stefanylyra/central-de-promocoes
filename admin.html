<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Admin Central de Promoções</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
.container{max-width:700px;margin:auto;background:#fff;padding:20px;border-radius:10px}
input,select{width:100%;padding:10px;margin:6px 0}
button{padding:10px;border:none;border-radius:6px;cursor:pointer;font-weight:bold}
.btn{background:#cc0a12;color:#fff;width:100%}
.card{background:#eee;padding:10px;margin:10px 0;border-radius:8px}
.card button{margin-right:5px}
</style>
</head>

<body>

<div class="container">

<h2>🧠 Admin Empresa</h2>

<input id="nome" placeholder="Nome produto">
<input id="img" placeholder="URL imagem">
<input id="link" placeholder="Link afiliado">
<input id="precoAntigo" placeholder="Preço antigo">
<input id="precoNovo" placeholder="Preço novo">

<!-- CATEGORIAS -->
<select id="categoria">
<option value="">Categoria</option>
<option value="roupas-masculinas">👕 Masculinas</option>
<option value="roupas-femininas">👗 Femininas</option>
<option value="plus-size">👚 Plus Size</option>
<option value="relogios">⌚ Relógios</option>
<option value="mae-bebe">👶 Mãe & Bebê</option>
<option value="viagens-bagagens">🧳 Viagem</option>
<option value="fones">🎧 Fones</option>
<option value="bolsas-masculinas">🎒 Bolsas Masc.</option>
<option value="bolsas-femininas">👝 Bolsas Fem.</option>
<option value="limpeza">🧼 Limpeza</option>
<option value="brinquedos">🧸 Brinquedos</option>
<option value="acessorios">💎 Acessórios</option>
<option value="pets">🐶 Pets</option>
<option value="sapatos">👟 Sapatos</option>
<option value="casa-construcao">🏡 Casa e construção</option>
<option value="beleza">💄 Beleza</option>
<option value="papelaria">✏️ Papelaria</option>
</select>

<!-- LOJAS -->
<select id="loja">
<option value="">Loja</option>
<option value="amazon">Amazon</option>
<option value="shopee">Shopee</option>
<option value="magalu">Magalu</option>
<option value="mercado-livre">Mercado Livre</option>
<option value="shein">Shein</option>
<option value="aliexpress">AliExpress</option>
</select>

<button class="btn" onclick="salvar()">Salvar Produto</button>

<h3>📦 Produtos</h3>
<div id="lista"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "central-promocoes.firebaseapp.com",
  projectId: "central-promocoes",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* 🔐 SEGURANÇA SIMPLES (troque seu email aqui) */
const ADMIN_EMAIL = "SEU_EMAIL@gmail.com";

/* SALVAR */
function salvar(){

    db.collection("produtos").add({
        nome: nome.value,
        img: img.value,
        link: link.value,
        precoAntigo: precoAntigo.value,
        precoNovo: precoNovo.value,
        categoria: categoria.value,
        loja: loja.value,
        ativo: true,
        criadoEm: new Date()
    });

    alert("Produto salvo!");
}

/* LISTAR */
db.collection("produtos")
.onSnapshot(snapshot => {

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    snapshot.forEach(doc => {

        const p = doc.data();

        lista.innerHTML += `
        <div class="card">
            <b>${p.nome}</b><br>
            <small>${p.categoria} | ${p.loja}</small><br>

            <button onclick="deletar('${doc.id}')">Excluir</button>
        </div>
        `;
    });

});

/* EXCLUIR */
function deletar(id){
    db.collection("produtos").doc(id).delete();
}

</script>

</body>
</html>
