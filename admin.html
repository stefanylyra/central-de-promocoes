<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Amazon Admin Final Boss</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

/* LOGIN */
#login{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.9);
}

.card{
    background:#111827;
    padding:25px;
    border-radius:14px;
    width:360px;
}

input,select{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:none;
}

/* DASHBOARD */
#dash{
    display:none;
    padding:20px;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111827;
    padding:15px;
    border-radius:12px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:15px;
}

.box{
    background:#111827;
    padding:15px;
    border-radius:12px;
}

/* PRODUTO */
.prod{
    display:flex;
    gap:10px;
    background:#1f2937;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

.prod img{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:8px;
}

.btn{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.primary{background:#cc0a12;color:white;}
.danger{background:#ef4444;color:white;}
</style>
</head>

<body>

<!-- 🔐 LOGIN OCULTO -->
<div id="login">
    <div class="card">
        <h2>🔐 Admin Final Boss</h2>

        <input id="email" value="tete1808sd@gmail.com">
        <input id="senha" type="password">

        <button class="btn primary" onclick="login()">Entrar</button>
    </div>
</div>

<!-- 📊 DASHBOARD -->
<div id="dash">

    <div class="top">
        <h2>🛒 Amazon Admin System</h2>
        <button class="btn danger" onclick="logout()">Sair</button>
    </div>

    <div class="grid">

        <!-- FORM -->
        <div class="box">
            <h3>➕ Produto</h3>

            <input id="nome" placeholder="Nome">
            <input id="precoAntigo" placeholder="Preço antigo">
            <input id="precoNovo" placeholder="Preço novo">
            <input id="img" placeholder="Imagem URL">
            <input id="link" placeholder="Link afiliado">

<select id="categoria">
<option value="roupas-masculinas">👕 Masculinas</option>
<option value="roupas-femininas">👗 Femininas</option>
<option value="plus-size">👚 Plus Size</option>
<option value="relogios">⌚ Relógios</option>
<option value="mae-bebe">👶 Mãe & Bebê</option>
<option value="viagens-bagagens">🧳 Viagem</option>
<option value="fones">🎧 Fones</option>
<option value="bolsas-masculinas">🎒 Bolsas Masc</option>
<option value="bolsas-femininas">👝 Bolsas Fem</option>
<option value="limpeza">🧼 Limpeza</option>
<option value="brinquedos">🧸 Brinquedos</option>
<option value="acessorios">💎 Acessórios</option>
<option value="pets">🐶 Pets</option>
<option value="sapatos">👟 Sapatos</option>
<option value="casa-construcao">🏡 Casa</option>
<option value="beleza">💄 Beleza</option>
<option value="papelaria">✏️ Papelaria</option>
</select>

    <select id="loja">
                <option value="amazon">Amazon</option>
                <option value="shopee">Shopee</option>
                <option value="mercado-livre">Mercado Livre</option>
                <option value="shein">Shein</option>
                <option value="aliexpress">AliExpress</option>
            </select>

            <button class="btn primary" onclick="salvar()">Salvar</button>
        </div>

        <!-- LISTA -->
        <div class="box">
            <h3>📦 Produtos</h3>
            <div id="lista"></div>
        </div>

    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU.firebaseapp.com",
  projectId: "SEU"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let editId = null;

/* 🔐 LOGIN */
function login(){
    auth.signInWithEmailAndPassword(email.value, senha.value)
    .then(()=>{
        login.style.display="none";
        dash.style.display="block";
    })
    .catch(()=>alert("Erro login"));
}

/* LOGOUT */
function logout(){
    auth.signOut().then(()=>location.reload());
}

/* AUTH */
auth.onAuthStateChanged(user=>{
    if(user){
        login.style.display="none";
        dash.style.display="block";
    }
});

/* SALVAR */
function salvar(){

    const produto = {
        nome:nome.value,
        precoAntigo:precoAntigo.value,
        precoNovo:precoNovo.value,
        img:img.value,
        link:link.value,
        categoria:categoria.value,
        loja:loja.value,
        criadoEm:new Date()
    };

    if(editId){
        db.collection("produtos").doc(editId).update(produto);
        editId=null;
    }else{
        db.collection("produtos").add(produto);
    }

    limpar();
}

/* LIMPAR */
function limpar(){
    nome.value="";
    precoAntigo.value="";
    precoNovo.value="";
    img.value="";
    link.value="";
}

/* LISTA */
db.collection("produtos").onSnapshot(snapshot=>{
    lista.innerHTML="";

    snapshot.forEach(doc=>{
        const p = doc.data();

        lista.innerHTML += `
        <div class="prod">
            <img src="${p.img}">
            <div>
                <b>${p.nome}</b><br>
                💰 ${p.precoNovo}<br>
                📦 ${p.categoria}
            </div>

            <button onclick="editar('${doc.id}','${p.nome}','${p.precoAntigo}','${p.precoNovo}','${p.img}','${p.link}','${p.categoria}','${p.loja}')">✏️</button>
            <button onclick="deletar('${doc.id}')">🗑️</button>
        </div>
        `;
    });
});

/* EDITAR */
function editar(id,n,pa,pn,imgv,linkv,cat,loja){
    nome.value=n;
    precoAntigo.value=pa;
    precoNovo.value=pn;
    img.value=imgv;
    link.value=linkv;
    categoria.value=cat;
    loja.value=loja;
    editId=id;
}

/* DELETE */
function deletar(id){
    db.collection("produtos").doc(id).delete();
}

</script>

</body>
</html>
