            max-width: 380px;

        }
        #admin {
            display: none;

        .content {

            overflow-y: auto;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            cursor: pointer;
            padding: 10px;
            margin: 5px 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            align-items: stretch;
        }
        .card {
            background: #fff;
            padding: 12px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 10px;
        }
        .nome-produto {
            font-weight: bold;
            line-height: 1.4;
            height: 55px;
            overflow: hidden;
            display: block;
        }
        .info-produto {

        .acoes {

        .btn-editar {

            border: none;

        function formatPrice(input) {
            let valor = input.value.replace(/[^0-9,]/g, '').replace(',', '.');
            if (!valor) return;
            let numero = parseFloat(valor);
            if (isNaN(numero)) return;
            input.value = numero.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        // ==================== SALVAR / ATUALIZAR ====================
        async function salvar(){
            const imagensExtras = [];
            if (document.getElementById("imgExtra1").value) imagensExtras.push(document.getElementById("imgExtra1").value);
            if (document.getElementById("imgExtra2").value) imagensExtras.push(document.getElementById("imgExtra2").value);

            const produto = {
                nome: document.getElementById("nome").value,
                precoAntigo: document.getElementById("precoAntigo").value,
                precoNovo: document.getElementById("precoNovo").value,
                img: document.getElementById("imgUrl").value, // imagem principal
                imagensExtras: imagensExtras, // array com até 2 extras
                link: document.getElementById("link").value,
                
                categoria: document.getElementById("categoria").value,
                subcategoria: document.getElementById("subcategoria").value,
                
                loja: document.getElementById("loja").value,
                
                updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                if (editingId) {
                    await db.collection("produtos").doc(editingId).update(produto);
                    alert("✅ Produto updated!");
                } else {
                    produto.createdAt = Date.now();
                    await db.collection("produtos").add(produto);
                    alert("✅ Produto salvo!");
                }
                cancelarEdicao();
                tab('lista');
            } catch (e) {
                alert("Erro ao salvar: " + e.message);
            }
        }

        function editar(id) {
           db.collection("produtos").doc(id).get().then(doc => {
                if (!doc.exists) return;
                const p = doc.data();
                editingId = id;
                document.getElementById("nome").value = p.nome || "";
                document.getElementById("precoAntigo").value = p.precoAntigo || "";
                document.getElementById("precoNovo").value = p.precoNovo || "";
                document.getElementById("imgUrl").value = p.img || "";
                document.getElementById("link").value = p.link || "";
                document.getElementById("loja").value = p.loja || "";
                document.getElementById("categoria").value = p.categoria || "";
                carregarSubcategorias();
                document.getElementById("subcategoria").value = p.subcategoria || "";
                
                // Imagens extras
                document.getElementById("imgExtra1").value = p.imagensExtras && p.imagensExtras[0] ? p.imagensExtras[0] : "";
                document.getElementById("imgExtra2").value = p.imagensExtras && p.imagensExtras[1] ? p.imagensExtras[1] : "";
                document.getElementById("formTitle").textContent = "Editar Produto";
                document.getElementById("btnSalvar").textContent = "Atualizar Produto";
                tab('novo');

function popularCategorias(){

    const select =
        document.getElementById("filtroCategoria");

    const categorias =
        [...new Set(todosProdutos.map(p => p.dados.categoria).filter(Boolean))];

    categorias.sort();

    categorias.forEach(cat=>{

        select.innerHTML +=
        `<option value="${cat}">${cat}</option>`;

    });

}
        function aplicarFiltros(){

    const texto =
        document.getElementById("pesquisa")
        .value
        .toLowerCase()
        .trim();

    const categoria =
        document.getElementById("filtroCategoria").value;

    const loja =
        document.getElementById("filtroLoja").value;

    produtosFiltrados = todosProdutos.filter(item => {

        const p = item.dados;

        const nome =
            (p.nome || "").toLowerCase();

        const passouNome =
            nome.includes(texto);

        const passouCategoria =
            !categoria || p.categoria === categoria;

        const passouLoja =
            !loja || p.loja === loja;

        return passouNome &&
               passouCategoria &&
               passouLoja;

    });

    paginaAtual = 1;

    renderizarPagina();

}
        function proximaPagina() {

   const totalPaginas =
Math.ceil(produtosFiltrados.length / PRODUTOS_POR_PAGINA);

    if (paginaAtual < totalPaginas) {

        paginaAtual++;

        renderizarPagina();

    }

}

function paginaAnterior() {

    if (paginaAtual > 1) {

        paginaAtual--;

        renderizarPagina();

    }

}

function copiar(texto) {
    navigator.clipboard.writeText(texto);
    alert("Copiado!");
}

function escapeHtml(text) {
    return text.replace(/'/g, "\\'").replace(/\n/g, "\\n");
}
        // ==================== GERENCIAMENTO DE CUPONS ====================

let cuponsEditandoId = null;

async function salvarCupom() {
    const codigo = document.getElementById("cupomCodigo").value.trim().toUpperCase();
    const descricao = document.getElementById("cupomDescricao").value.trim();

    if (!codigo || !descricao) {
        alert("Preencha o código e a descrição!");
        return;
    }

    const cupom = {
        codigo: codigo,
        descricao: descricao,
        criadoEm: firebase.firestore.FieldValue.serverTimestamp(),
        ativo: true
    };

    try {
        if (cuponsEditandoId) {
            await db.collection("cupons").doc(cuponsEditandoId).update(cupom);
            alert("Cupom atualizado!");
        } else {
            await db.collection("cupons").add(cupom);
            alert("Cupom salvo com sucesso!");
        }
        limparFormularioCupom();
        carregarCupons();
    } catch (e) {
        alert("Erro: " + e.message);
    }
}

function limparFormularioCupom() {
    cuponsEditandoId = null;
    document.getElementById("cupomCodigo").value = "";
    document.getElementById("cupomDescricao").value = "";
}

async function carregarCupons() {
    const container = document.getElementById("lista-cupons");
    container.innerHTML = "";

    const snapshot = await db.collection("cupons").orderBy("criadoEm", "desc").get();

    snapshot.forEach(doc => {
        const c = doc.data();
        const html = `
            <div class="card">
                <h3 style="color:#cc0a12;">${c.codigo}</h3>
                <p>${c.descricao}</p>
                <small>${c.ativo ? '✅ Ativo' : '❌ Inativo'}</small>
                <div class="acoes" style="margin-top:10px;">
                    <button class="btn-editar" onclick="editarCupom('${doc.id}')">Editar</button>
                    <button class="btn-excluir" onclick="excluirCupom('${doc.id}')">Excluir</button>
                </div>
            </div>
        `;
        container.innerHTML += html;
    });
}

function editarCupom(id) {
    db.collection("cupons").doc(id).get().then(doc => {
        if (!doc.exists) return;
        const c = doc.data();
        cuponsEditandoId = id;
        document.getElementById("cupomCodigo").value = c.codigo;
        document.getElementById("cupomDescricao").value = c.descricao;
    });
}

async function excluirCupom(id) {
    if (confirm("Excluir este cupom?")) {
        await db.collection("cupons").doc(id).delete();
        carregarCupons();
    }
}
