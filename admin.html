<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin Marketplace Pro</title>
    <style>
        body { margin: 0; font-family: Arial; background: #f4f6fb; }
        #login { max-width: 380px; margin: 100px auto; background: #fff; padding: 20px; border-radius: 12px; }
        #admin { display: none; min-height: 100vh; flex-direction: row; }
        .sidebar { width: 220px; background: #111; color: #fff; padding: 15px; }
        .sidebar button { width: 100%; margin: 5px 0; padding: 10px; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ddd; border-radius: 8px; }
        button { cursor: pointer; padding: 10px; margin: 5px 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        .acoes { margin-top: 10px; display: flex; gap: 8px; }
        .btn-editar { background: #28a745; color: white; border: none; }
        .btn-excluir { background: #dc3545; color: white; border: none; }
    </style>
</head>
<body>

    <div id="login">
        <h2>Admin Login</h2>
        <input id="email" placeholder="email">
        <input id="senha" type="password" placeholder="senha">
        <button onclick="login()">Entrar</button>
    </div>

    <div id="admin">
        <div class="sidebar">
            <h3>Admin Panel</h3>
            <button onclick="logout()">Sair</button>
            <hr>
            <button onclick="tab('novo')">➕ Novo Produto</button>
            <button onclick="tab('lista')">📦 Produtos</button>
            <button onclick="tab('cupons')">🎟️ Cupons</button>
            <button onclick="tab('analises')">📊 Análises</button>
        </div>

        <div class="content">
            <!-- PRODUTOS (mantido igual) -->
            <div id="novo" style="display:none;"> ... (seu formulário de produto atual) ... </div>
            <div id="lista" style="display:none;"> ... (sua lista de produtos) ... </div>

            <!-- NOVA ABA DE CUPONS -->
            <div id="cupons" style="display:none;">
                <h2>🎟️ Gerenciar Cupons</h2>
                
                <h3>Novo Cupom</h3>
                <input id="cupomCodigo" placeholder="Código do Cupom (ex: CUPOM20)">
                <input id="cupomDescricao" placeholder="Descrição">
                <input id="cupomDesconto" placeholder="Desconto (ex: 20% OFF)">
                <input id="cupomLoja" placeholder="Loja (ex: Shopee)">
                <input id="cupomValidade" type="date" placeholder="Validade">
                <button onclick="salvarCupom()">Salvar Cupom</button>

                <hr>
                <h3>Cupons Cadastrados</h3>
                <div class="grid" id="gridCupons"></div>
            </div>

            <div id="analises" style="display:none;"> ... </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // === Firebase Config (mesmo do index) ===
        const firebaseConfig = { /* seu config */ };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let editingCupomId = null;

        // ==================== CUPONS ====================
        function salvarCupom() {
            const cupom = {
                codigo: document.getElementById("cupomCodigo").value.trim().toUpperCase(),
                descricao: document.getElementById("cupomDescricao").value,
                desconto: document.getElementById("cupomDesconto").value,
                loja: document.getElementById("cupomLoja").value,
                validade: document.getElementById("cupomValidade").value,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (!cupom.codigo || !cupom.descricao) {
                alert("Código e descrição são obrigatórios!");
                return;
            }

            if (editingCupomId) {
                db.collection("cupons").doc(editingCupomId).update(cupom).then(() => {
                    alert("Cupom atualizado!");
                    cancelarEdicaoCupom();
                    carregarCupons();
                });
            } else {
                db.collection("cupons").add(cupom).then(() => {
                    alert("Cupom salvo com sucesso!");
                    cancelarEdicaoCupom();
                    carregarCupons();
                });
            }
        }

        function carregarCupons() {
            db.collection("cupons").orderBy("createdAt", "desc").get().then(snapshot => {
                let html = "";
                snapshot.forEach(doc => {
                    const c = doc.data();
                    html += `
                        <div class="card">
                            <strong>${c.codigo}</strong><br>
                            <small>${c.descricao}</small><br>
                            <small><b>${c.desconto}</b> • ${c.loja || 'Geral'}</small><br>
                            <small>Validade: ${c.validade || 'Sem data'}</small>
                            <div class="acoes">
                                <button class="btn-editar" onclick="editarCupom('${doc.id}')">Editar</button>
                                <button class="btn-excluir" onclick="if(confirm('Excluir?')) excluirCupom('${doc.id}')">Excluir</button>
                            </div>
                        </div>
                    `;
                });
                document.getElementById("gridCupons").innerHTML = html || "<p>Nenhum cupom cadastrado ainda.</p>";
            });
        }

        function editarCupom(id) {
            db.collection("cupons").doc(id).get().then(doc => {
                if (!doc.exists) return;
                const c = doc.data();
                editingCupomId = id;
                document.getElementById("cupomCodigo").value = c.codigo;
                document.getElementById("cupomDescricao").value = c.descricao;
                document.getElementById("cupomDesconto").value = c.desconto;
                document.getElementById("cupomLoja").value = c.loja || "";
                document.getElementById("cupomValidade").value = c.validade || "";
            });
        }

        function excluirCupom(id) {
            db.collection("cupons").doc(id).delete().then(() => carregarCupons());
        }

        function cancelarEdicaoCupom() {
            editingCupomId = null;
            document.getElementById("cupomCodigo").value = "";
            document.getElementById("cupomDescricao").value = "";
            document.getElementById("cupomDesconto").value = "";
            document.getElementById("cupomLoja").value = "";
            document.getElementById("cupomValidade").value = "";
        }

        // ==================== TABS ====================
       function tab(t){
    document.getElementById("novo").style.display =
        t === "novo" ? "block" : "none";

    document.getElementById("lista").style.display =
        t === "lista" ? "block" : "none";

    document.getElementById("analises").style.display =
        t === "analises" ? "block" : "none";
}

    // outro ai
        
    function atualizarAnalises(produtos){

   const lojas = {
    shopee: 0,
    amazon: 0,
    "mercado-livre": 0,
    shein: 0,
    aliexpress: 0,
    magalu: 0
};

    produtos.forEach(p => {
        if(lojas[p.loja] !== undefined){
            lojas[p.loja]++;
        }
    });
    const total = produtos.length;

    document.getElementById("resumoLojas").innerHTML = `
        <div class="card">
            <h3>Total de Produtos: ${total}</h3>

            <p>🟠 Shopee: ${lojas.shopee}</p>
            <p>🟡 Amazon: ${lojas.amazon}</p>
            <p>🔵 Mercado Livre: ${lojas["mercado-livre"]}</p>
            <p>🔴 Shein: ${lojas.shein}</p>
            <p>🟣 AliExpress: ${lojas.aliexpress}</p>
            <p>🟢 Magazine Luiza: ${lojas.magalu}</p>    
            </div>
    `;
}

        // FUNÇÃO SUBCATEGORIAS
        
        function carregarSubcategorias(){

    const categoria =
        document.getElementById("categoria").value;

    const select =
        document.getElementById("subcategoria");

    select.innerHTML =
        '<option value="">Selecione uma subcategoria</option>';

    if(!SUBCATEGORIAS[categoria]) return;

    SUBCATEGORIAS[categoria].forEach(sub => {

        select.innerHTML += `
            <option value="${sub}">
                ${sub}
            </option>
        `;

    });

}
        // ==================== SALVAR / ATUALIZAR ====================
        async function salvar(){
            const imagensExtras = [];
            if (document.getElementById("imgExtra1").value) imagensExtras.push(document.getElementById("imgExtra1").value);
            if (document.getElementById("imgExtra2").value) imagensExtras.push(document.getElementById("imgExtra2").value);

            const produto = {
                nome: document.getElementById("nome").value,
                precoAntigo: document.getElementById("precoAntigo").value,
                precoNovo: document.getElementById("precoNovo").value,
                img: document.getElementById("imgUrl").value, // imagem principal
                imagensExtras: imagensExtras, // array com até 2 extras
                link: document.getElementById("link").value,
                
                categoria: document.getElementById("categoria").value,
                subcategoria: document.getElementById("subcategoria").value,
                
                loja: document.getElementById("loja").value,
                
                updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                if (editingId) {
                    await db.collection("produtos").doc(editingId).update(produto);
                    alert("✅ Produto updated!");
                } else {
                    produto.createdAt = Date.now();
                    await db.collection("produtos").add(produto);
                    alert("✅ Produto salvo!");
                }
                cancelarEdicao();
                tab('lista');
            } catch (e) {
                alert("Erro ao salvar: " + e.message);
            }
        }

        // ==================== EDITAR ====================
        function editar(id) {
           db.collection("produtos").doc(id).get().then(doc => {
                if (!doc.exists) return;
                const p = doc.data();
                editingId = id;
                document.getElementById("nome").value = p.nome || "";
                document.getElementById("precoAntigo").value = p.precoAntigo || "";
                document.getElementById("precoNovo").value = p.precoNovo || "";
                document.getElementById("imgUrl").value = p.img || "";
                document.getElementById("link").value = p.link || "";
                document.getElementById("loja").value = p.loja || "";
                document.getElementById("categoria").value = p.categoria || "";
                carregarSubcategorias();
                document.getElementById("subcategoria").value = p.subcategoria || "";
                
                // Imagens extras
                document.getElementById("imgExtra1").value = p.imagensExtras && p.imagensExtras[0] ? p.imagensExtras[0] : "";
                document.getElementById("imgExtra2").value = p.imagensExtras && p.imagensExtras[1] ? p.imagensExtras[1] : "";
                document.getElementById("formTitle").textContent = "Editar Produto";
                document.getElementById("btnSalvar").textContent = "Atualizar Produto";
                tab('novo');
            });
        }

        function cancelarEdicao(){
            editingId = null;
            document.getElementById("formTitle").textContent = "Novo Produto";
            document.getElementById("btnSalvar").textContent = "Salvar Produto";
            document.getElementById("nome").value = "";
            document.getElementById("precoAntigo").value = "";
            document.getElementById("precoNovo").value = "";
            document.getElementById("imgUrl").value = "";
            document.getElementById("imgExtra1").value = "";
            document.getElementById("imgExtra2").value = "";
            document.getElementById("link").value = "";
            document.getElementById("subcategoria").value = "";
        }
        function renderizarPagina() {

    const grid = document.getElementById("grid");

    grid.innerHTML = "";

    const inicio = (paginaAtual - 1) * PRODUTOS_POR_PAGINA;

    const fim = inicio + PRODUTOS_POR_PAGINA;

const pagina = produtosFiltrados.slice(inicio, fim);
    let html = "";

    pagina.forEach(item => {

        const doc = item.doc;
        const p = item.dados;

        html += `
            <div class="card">

                <img loading="lazy"
                     src="${p.img || ''}"
                     alt="${p.nome || ''}">

                <div class="info-produto">

                    <span class="nome-produto">

                        ${p.nome || 'Sem nome'}

                    </span>

                    <span class="price-old">

                        De: ${p.precoAntigo || ''}

                    </span>

                    <br>

                    <strong>

                        Por: ${p.precoNovo || ''}

                    </strong>

                    <br>

                    <small>

                        🏪 ${p.loja || ''}<br>

                        📂 ${p.categoria || ''}<br>

                        🏷️ ${p.subcategoria || ''}<br>

                        📷 ${p.imagensExtras ? p.imagensExtras.length : 0} extra(s)

                    </small>

                </div>

             <div class="acoes">

    <button
        class="btn-editar"
        onclick="editar('${doc}')">
        Editar
    </button>

    <button
        class="btn-excluir"
        onclick="if(confirm('Excluir este produto?')) db.collection('produtos').doc('${doc}').delete()">
        Excluir
    </button>

    <button
        class="btn-ia"
        onclick="abrirIA('${doc}')">
        ✨ IA
    </button>

</div>
            </div>
        `;

    });

    grid.innerHTML = html;
            const totalPaginas =
    Math.ceil(produtosFiltrados.length / PRODUTOS_POR_PAGINA)

document.getElementById("numeroPagina").innerHTML =
`Página ${paginaAtual} de ${totalPaginas}`;

}
        
function popularCategorias(){

    const select =
        document.getElementById("filtroCategoria");

    const categorias =
        [...new Set(todosProdutos.map(p => p.dados.categoria).filter(Boolean))];

    categorias.sort();

    categorias.forEach(cat=>{

        select.innerHTML +=
        `<option value="${cat}">${cat}</option>`;

    });

}
        function aplicarFiltros(){

    const texto =
        document.getElementById("pesquisa")
        .value
        .toLowerCase()
        .trim();

    const categoria =
        document.getElementById("filtroCategoria").value;

    const loja =
        document.getElementById("filtroLoja").value;

    produtosFiltrados = todosProdutos.filter(item => {

        const p = item.dados;

        const nome =
            (p.nome || "").toLowerCase();

        const passouNome =
            nome.includes(texto);

        const passouCategoria =
            !categoria || p.categoria === categoria;

        const passouLoja =
            !loja || p.loja === loja;

        return passouNome &&
               passouCategoria &&
               passouLoja;

    });

    paginaAtual = 1;

    renderizarPagina();

}
        function proximaPagina() {

   const totalPaginas =
Math.ceil(produtosFiltrados.length / PRODUTOS_POR_PAGINA);

    if (paginaAtual < totalPaginas) {

        paginaAtual++;

        renderizarPagina();

    }

}

function paginaAnterior() {

    if (paginaAtual > 1) {

        paginaAtual--;

        renderizarPagina();

    }

}

        // ==================== LISTAR ====================
db.collection("produtos")
.orderBy("createdAt", "desc")
.get()
.then(snap => {

    todosProdutos = [];

    const produtos = [];

    snap.forEach(doc => {

        const p = doc.data();

        produtos.push(p);

        todosProdutos.push({
            doc: doc.id,
            dados: p
        });

    });

   atualizarAnalises(produtos);

popularCategorias();

produtosFiltrados = [...todosProdutos];

renderizarPagina();

});
        let produtoAtualIA = null;

function abrirIA(id) {

    produtoAtualIA = todosProdutos.find(p => p.doc === id);

    if (!produtoAtualIA) {
        alert("Produto ainda não carregou. Tente novamente.");
        return;
    }

    const p = produtoAtualIA.dados;

    document.getElementById("infoProdutoIA").innerHTML = `
        <b>${p.nome}</b><br>
        💰 ${p.precoNovo}<br>
        🏪 ${p.loja}<br>
    `;

    document.getElementById("resultadoIA").innerHTML = "";
    document.getElementById("modalIA").style.display = "flex";
}
        
function fecharIA() {
    document.getElementById("modalIA").style.display = "none";
}
  function gerarConteudoIA() {

    if (!produtoAtualIA) {
        alert("Nenhum produto selecionado");
        return;
    }

    const p = produtoAtualIA.dados;

   const whatsapp = `
${aleatorio(frasesTopo)}

👟 ${p.nome}

💰 DE R$: ~${p.precoAntigo}~
POR APENAS R$: *${p.precoNovo}*

🛒 GARANTA O SEU AQUI:
${p.link}

🚨 Não deixa pra depois porque pode acabar a qualquer momento!
`;
      
    const instagram = `

💰 ${p.precoNovo}

🔥 Oferta especial por tempo limitado!

`;

    const hashtags = `

`;

    document.getElementById("resultadoIA").innerHTML = `
        <h3>📲 WhatsApp (vendas)</h3>

        <button onclick="copiar(\`${whatsapp}\`)">Copiar</button>

        <h3>📸 Instagram</h3>
        <pre>${instagram}</pre>
        <button onclick="copiar(\`${instagram}\`)">Copiar</button>

        <h3>🏷️ Hashtags</h3>
        <pre>${hashtags}</pre>
        <button onclick="copiar(\`${hashtags}\`)">Copiar</button>
    `;
}
function copiar(texto) {
    navigator.clipboard.writeText(texto);
    alert("Copiado!");
}

function escapeHtml(text) {
    return text.replace(/'/g, "\\'").replace(/\n/g, "\\n");
}
        
    </script>

position:fixed;
top:0;left:0;
width:100%;height:100%;

z-index:9999;">

    <div style="background:#fff;
    width:90%;
    max-width:600px;
    padding:20px;
    border-radius:12px;
    max-height:90vh;
    overflow:auto;">

        <h2>✨ Central IA</h2>

        <div id="infoProdutoIA"></div>

        <hr>

        <label><input type="checkbox" checked> WhatsApp</label><br>
        <label><input type="checkbox" checked> Instagram</label><br>
        <label><input type="checkbox"> Hashtags</label><br>
        <label><input type="checkbox"> Story</label><br>

        <br>

        <button onclick="gerarConteudoIA()" style="background:#6f42c1;color:white;">
            ✨ Gerar Conteúdo
        </button>

    </div>

</div>
</body>
</html>
