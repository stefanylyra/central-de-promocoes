<!DOCTYPE html>

<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin Marketplace Pro</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6fb;
        }
        #login {
            max-width: 380px;
            margin: 100px auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
        }
        #admin {
            display: none;
            min-height: 100vh;
            flex-direction: row;
        }
        .sidebar {
            width: 220px;
            background: #111;
            color: #fff;
            padding: 15px;
        }
        .sidebar button {
            width: 100%;
            margin: 5px 0;
            padding: 10px;
        }
        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            cursor: pointer;
            padding: 10px;
            margin: 5px 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            align-items: stretch;
        }
        .card {
            background: #fff;
            padding: 12px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 10px;
        }
        .nome-produto {
            font-weight: bold;
            line-height: 1.4;
            height: 55px;
            overflow: hidden;
            display: block;
        }
