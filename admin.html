<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin Premium</title>

<style>
body {
    font-family: Arial;
    margin:0;
    background:#f4f6fb;
}

#login {
    max-width:400px;
    margin:100px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
}

#admin {
    display:none;
    min-height:100vh;
    display:flex;
}

.sidebar {
    width:220px;
    background:#111;
    color:#fff;
    padding:15px;
}

.sidebar button {
    width:100%;
    margin:5px 0;
}

.content {
    flex:1;
    padding:20px;
}

input, select {
    width:100%;
    padding:10px;
    margin:5px 0;
}

button {
    padding:10px;
    cursor:pointer;
}

.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.card {
    background:#fff;
    padding:10px;
    border-radius:10px;
}

img {
    width:100%;
    border-radius:10px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login">
    <h2>Admin Login</h2>
    <input id="email" placeholder="email">
    <input id="senha" type="password" placeholder="senha">
    <button onclick="login()">Entrar</button>
</div>

<!-- 📊 ADMIN -->
<div id="admin">

<div class="sidebar">
    <h3>Admin</h3>
    <button onclick="logout()">Sair</button>
    <hr>
    <button onclick="tab('novo')">➕ Novo</button>
    <button onclick="tab('lista')">📦 Produtos</button>
</div>

<div class="content">

<!-- NOVO -->
<div id="novo">

<h2>Novo Produto</h2>

<input id="nome" placeholder="Nome">
<input id="precoAntigo" placeholder="Preço antigo">
<input id="precoNovo" placeholder="Preço novo">

<select id="categoria">
            <option value="roupas-masculinas">👕 Masculinas</option>
            <option value="roupas-femininas">👗 Femininas</option>
            <option value="plus-size">👚 Plus Size</option>
            <option value="relogios">⌚ Relógios</option>
            <option value="mae-bebe">👶 Mãe & Bebê</option>
            <option value="viagens-bagagens">🧳 Viagens</option>
            <option value="fones">🎧 Fones</option>
            <option value="bolsas-masculinas">🎒 Bolsas Masc</option>
            <option value="bolsas-femininas">👛 Bolsas Fem</option>
            <option value="limpeza">🧼 Limpeza</option>
            <option value="brinquedos">🧸 Brinquedos</option>
            <option value="acessorios">💎 Acessórios</option>
            <option value="pets">🐶 Pets</option>
            <option value="sapatos">👟 Sapatos</option>
            <option value="casa-construcao">🏡 Casa</option>
            <option value="beleza">💄 Beleza</option>
            <option value="papelaria">✏️ Papelaria</option>
        </select>

     <select id="loja">
<option value="shopee">Shopee</option>
<option value="amazon">Amazon</option>
<option value="aliexpress">AliExpress</option>
</select>

<input id="imgUrl" placeholder="URL da imagem">

<p>ou upload:</p>
<input type="file" id="imgFile">

<!-- 👀 PREVIEW -->
<img id="preview" style="display:none;margin-top:10px;max-height:200px;">

<input id="link" placeholder="Link afiliado">

<button onclick="salvar()">Salvar Produto</button>

</div>

<!-- LISTA -->
<div id="lista" style="display:none;">
<h2>Produtos</h2>
<div class="grid" id="grid"></div>
</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "central-promocoes.firebaseapp.com",
  projectId: "central-promocoes",
  storageBucket: "central-promocoes.appspot.com",
  appId: "SEU_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let editId = null;

// 👁️ PREVIEW IMAGE URL
imgUrl.oninput = () => {
    preview.src = imgUrl.value;
    preview.style.display = imgUrl.value ? "block" : "none";
};

imgFile.onchange = () => {
    const file = imgFile.files[0];

    if(file){
        const reader = new FileReader();

        reader.onload = e => {
            preview.src = e.target.result;
            preview.style.display = "block";
        };

        reader.readAsDataURL(file);
    }
};

// 🔐 LOGIN
function login(){
    auth.signInWithEmailAndPassword(email.value, senha.value)
    .catch(e => alert("Erro login"));
}

// 🔓 LOGOUT
function logout(){
    auth.signOut();
}

// 👤 AUTH CHECK
auth.onAuthStateChanged(async user => {

    if(!user){
        login.style.display = "block";
        admin.style.display = "none";
        return;
    }

    // 🔥 PERMISSÃO POR EMAIL (SEU EMAIL FIXO)
    if(user.email === "tete1808sd@gmail.com"){
        login.style.display = "none";
        admin.style.display = "flex";
    } else {
        alert("Sem permissão");
        auth.signOut();
    }

});

// 📂 TAB
function tab(t){
    novo.style.display = t === 'novo' ? "block" : "none";
    lista.style.display = t === 'lista' ? "block" : "none";
}

// 📤 UPLOAD
async function upload(file){
    const ref = storage.ref("produtos/" + Date.now());
    await ref.put(file);
    return await ref.getDownloadURL();
}

// 💾 SALVAR
async function salvar(){

    try {

        let img = "";

        const file = document.getElementById("imgFile").files[0];
        const url = document.getElementById("imgUrl").value;

        // 📤 upload file
        if(file){
            img = await upload(file);
        }
        // 🌐 ou URL
        else if(url){
            img = url;
        }

        const produto = {
            nome: nome.value,
            precoAntigo: precoAntigo.value,
            precoNovo: precoNovo.value,
            img: img || "",
            link: link.value,
            categoria: categoria.value,
            loja: loja.value
        };

        await db.collection("produtos").add(produto);

        alert("Produto salvo com sucesso!");

        nome.value = "";
        precoAntigo.value = "";
        precoNovo.value = "";
        imgFile.value = "";
        imgUrl.value = "";
        link.value = "";

        preview.style.display = "none";

    } catch (e) {
        console.error(e);
        alert("Erro ao salvar produto (veja console)");
    }
}

// 📦 LISTAR
function load(){

db.collection("produtos").onSnapshot(snap => {

    grid.innerHTML = "";

    snap.forEach(doc => {
        let p = doc.data();

        grid.innerHTML += `
        <div class="card">
            <img src="${p.img || 'https://via.placeholder.com/300'}">
            <b>${p.nome}</b><br>
            R$ ${p.precoNovo}<br>

            <button onclick="del('${doc.id}')">Excluir</button>
        </div>
        `;
    });

});

}

load();

// 🗑️ DELETE
function del(id){
    db.collection("produtos").doc(id).delete();
}

</script>

</body>
</html>
