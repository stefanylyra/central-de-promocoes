<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin Marketplace Pro</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6fb;
        }
        #login {
            max-width: 380px;
            margin: 100px auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
        }
        #admin {
            display: none;
            min-height: 100vh;
            flex-direction: row;
        }
        .sidebar {
            width: 220px;
            background: #111;
            color: #fff;
            padding: 15px;
        }
        .sidebar button {
            width: 100%;
            margin: 5px 0;
            padding: 10px;
        }
        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            cursor: pointer;
            padding: 10px;
            margin: 5px 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            align-items: stretch;
        }
        .card {
            background: #fff;
            padding: 12px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 10px;
        }
        .nome-produto {
            font-weight: bold;
            line-height: 1.4;
            height: 55px;
            overflow: hidden;
            display: block;
        }
        .info-produto {
            flex: 1;
        }
        .acoes {
            margin-top: auto;
            display: flex;
            gap: 8px;
        }
        .btn-editar {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px;
        }
        .btn-excluir {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px;
        }
        .price-old {
            text-decoration: line-through;
            color: #999;
        }
    </style>
</head>
<body>
    <div id="login">
        <h2>Admin Login</h2>
        <input id="email" placeholder="email">
        <input id="senha" type="password" placeholder="senha">
        <button onclick="login()">Entrar</button>
    </div>

    <div id="admin">
        <div class="sidebar">
            <h3>Admin Panel</h3>
            <button onclick="logout()">Sair</button>
            <hr>
            <button onclick="tab('novo')">➕ Novo Produto</button>
            <button onclick="tab('lista')">📦 Produtos</button>
            <button onclick="tab('analises')">📊 Análises</button>
        </div>
        <div class="content">
            <div id="novo">
                <h2 id="formTitle">Novo Produto</h2>
                <input id="nome" placeholder="Nome do produto" required>
                <input id="precoAntigo" placeholder="Preço antigo (ex: 49.90)" onblur="formatPrice(this)">
                <input id="precoNovo" placeholder="Preço novo (ex: 29.90)" onblur="formatPrice(this)">
               <select id="categoria" onchange="carregarSubcategorias()">

    <option value="roupas-masculinas">👕 Roupas Masculinas</option>
    <option value="roupas-femininas">👗 Roupas Femininas</option>
    <option value="roupas-infantis">🧒 Roupas Infantis</option>
    <option value="plus-size">👚 Plus Size</option>
    <option value="sapatos">👟 Sapatos</option>
    <option value="relogios">⌚ Relógios</option>
    <option value="acessorios">💎 Acessórios</option>
    <option value="bolsas-masculinas">🎒 Bolsas Masculinas</option>
    <option value="bolsas-femininas">👝 Bolsas Femininas</option>
    <option value="eletronicos">💻 Eletrônicos</option>
    <option value="eletrodomesticos">📺 Eletrodomésticos</option>
    <option value="fitness">🏋️ Fitness</option>
    <option value="automotivo">🚗 Automotivo</option>
    <option value="livros">📚 Livros</option>
    <option value="mae-bebe">👶 Mãe & Bebê</option>
    <option value="alimentos">🍔 Alimentos</option>
    <option value="beleza">💄 Beleza</option>
    <option value="perfumes">🌸 Perfumes</option>
    <option value="pets">🐶 Pets</option>
    <option value="brinquedos">🧸 Brinquedos</option>
    <option value="papelaria">✏️ Papelaria</option>
    <option value="limpeza">🧼 Limpeza</option>
    <option value="casa-construcao">🏡 Casa & Construção</option>
    <option value="viagens-bagagens">🧳 Viagens</option>
    <option value="festividades">🎉 Festividades</option>

</select>
                <select id="subcategoria">

    <option value="">
        Selecione uma subcategoria
    </option>

</select>
               <select id="loja">
    <option value="shopee">Shopee</option>
    <option value="amazon">Amazon</option>
    <option value="magalu">Magazine Luiza</option>     <!-- ALTERADO -->
    <option value="mercado-livre">Mercado Livre</option>
    <option value="shein">Shein</option>
    <option value="aliexpress">AliExpress</option>
</select>
                <h4>Imagem Principal (obrigatória)</h4>
                <input id="imgUrl" placeholder="URL da imagem principal" required>
                <h4>Imagens Extras (opcionais - até 2)</h4>
                <input id="imgExtra1" placeholder="URL da imagem extra 1 (opcional)">
                <input id="imgExtra2" placeholder="URL da imagem extra 2 (opcional)">
                <input id="link" placeholder="Link afiliado" required>
                <button id="btnSalvar" onclick="salvar()">Salvar Produto</button>
                <button onclick="cancelarEdicao()" style="background:#ccc;">Cancelar</button>
            </div>

            <div id="lista" style="display:none;">
                <h2>Produtos Cadastrados</h2>
                <div class="grid" id="grid"></div>
            </div>
        <div id="analises" style="display:none;">
    <h2>📊 Análises</h2>

    <div id="resumoLojas"></div>
</div>
    </div>

    <script>

const SUBCATEGORIAS = {

        // ==================== FORMATAÇÃO DE PREÇO ====================
        function formatPrice(input) {
            let valor = input.value.replace(/[^0-9,]/g, '').replace(',', '.');
            if (!valor) return;
            let numero = parseFloat(valor);
            if (isNaN(numero)) return;
            input.value = numero.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        // ==================== LOGIN ====================
        function login(){
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;
            auth.signInWithEmailAndPassword(email, senha).catch(() => alert("Erro no login"));
        }

        function logout(){
            auth.signOut();
        }

        auth.onAuthStateChanged(user => {
            if(!user){
                document.getElementById("login").style.display = "block";
                document.getElementById("admin").style.display = "none";
                return;
            }
            if(user.email === "tete1808sd@gmail.com"){
                document.getElementById("login").style.display = "none";
                document.getElementById("admin").style.display = "flex";
                tab('lista');
            } else {
                alert("Sem permissão");
                auth.signOut();
            }
        });

        // ==================== TABS ====================
       function tab(t){
    document.getElementById("novo").style.display =
        t === "novo" ? "block" : "none";

    document.getElementById("lista").style.display =
        t === "lista" ? "block" : "none";

    document.getElementById("analises").style.display =
        t === "analises" ? "block" : "none";
}

    // outro ai
        
    function atualizarAnalises(produtos){

   const lojas = {
    shopee: 0,
    amazon: 0,
    "mercado-livre": 0,
    shein: 0,
    aliexpress: 0,
    magalu: 0
};

    produtos.forEach(p => {
        if(lojas[p.loja] !== undefined){
            lojas[p.loja]++;
        }
    });
    const total = produtos.length;

    document.getElementById("resumoLojas").innerHTML = `
        <div class="card">
            <h3>Total de Produtos: ${total}</h3>

            <p>🟠 Shopee: ${lojas.shopee}</p>
            <p>🟡 Amazon: ${lojas.amazon}</p>
            <p>🔵 Mercado Livre: ${lojas["mercado-livre"]}</p>
            <p>🔴 Shein: ${lojas.shein}</p>
            <p>🟣 AliExpress: ${lojas.aliexpress}</p>
            <p>🟢 Magazine Luiza: ${lojas.magalu}</p>    
            </div>
    `;
}

        // FUNÇÃO SUBCATEGORIAS
        
        function carregarSubcategorias(){

    const categoria =
        document.getElementById("categoria").value;

    const select =
        document.getElementById("subcategoria");

    select.innerHTML =
        '<option value="">Selecione uma subcategoria</option>';

    if(!SUBCATEGORIAS[categoria]) return;

    SUBCATEGORIAS[categoria].forEach(sub => {

        select.innerHTML += `
            <option value="${sub}">
                ${sub}
            </option>
        `;

    });

}
        // ==================== SALVAR / ATUALIZAR ====================
        async function salvar(){
            const imagensExtras = [];
            if (document.getElementById("imgExtra1").value) imagensExtras.push(document.getElementById("imgExtra1").value);
            if (document.getElementById("imgExtra2").value) imagensExtras.push(document.getElementById("imgExtra2").value);

            const produto = {
                nome: document.getElementById("nome").value,
                precoAntigo: document.getElementById("precoAntigo").value,
                precoNovo: document.getElementById("precoNovo").value,
                img: document.getElementById("imgUrl").value, // imagem principal
                imagensExtras: imagensExtras, // array com até 2 extras
                link: document.getElementById("link").value,
                
                categoria: document.getElementById("categoria").value,
                subcategoria: document.getElementById("subcategoria").value,
                
                loja: document.getElementById("loja").value,
                
                updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                if (editingId) {
                    await db.collection("produtos").doc(editingId).update(produto);
                    alert("✅ Produto updated!");
                } else {
                    produto.createdAt = Date.now();
                    await db.collection("produtos").add(produto);
                    alert("✅ Produto salvo!");
                }
                cancelarEdicao();
                tab('lista');
            } catch (e) {
                alert("Erro ao salvar: " + e.message);
            }
        }

        // ==================== EDITAR ====================
        function editar(id) {
            db.collection("produtos").doc(id).get().then(doc => {
                if (!doc.exists) return;
                const p = doc.data();
                editingId = id;
                document.getElementById("nome").value = p.nome || "";
                document.getElementById("precoAntigo").value = p.precoAntigo || "";
                document.getElementById("precoNovo").value = p.precoNovo || "";
                document.getElementById("imgUrl").value = p.img || "";
                document.getElementById("link").value = p.link || "";
                document.getElementById("loja").value = p.loja || "";
                document.getElementById("categoria").value = p.categoria || "";
                carregarSubcategorias();
                document.getElementById("subcategoria").value = p.subcategoria || "";
                
                // Imagens extras
                document.getElementById("imgExtra1").value = p.imagensExtras && p.imagensExtras[0] ? p.imagensExtras[0] : "";
                document.getElementById("imgExtra2").value = p.imagensExtras && p.imagensExtras[1] ? p.imagensExtras[1] : "";
                document.getElementById("formTitle").textContent = "Editar Produto";
                document.getElementById("btnSalvar").textContent = "Atualizar Produto";
                tab('novo');
            });
        }

        function cancelarEdicao(){
            editingId = null;
            document.getElementById("formTitle").textContent = "Novo Produto";
            document.getElementById("btnSalvar").textContent = "Salvar Produto";
            document.getElementById("nome").value = "";
            document.getElementById("precoAntigo").value = "";
            document.getElementById("precoNovo").value = "";
            document.getElementById("imgUrl").value = "";
            document.getElementById("imgExtra1").value = "";
            document.getElementById("imgExtra2").value = "";
            document.getElementById("link").value = "";
            document.getElementById("subcategoria").value = "";
        }

        // ==================== LISTAR ====================
       db.collection("produtos").onSnapshot(snap => {

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const produtos = []; // ← ADICIONE AQUI

    snap.forEach(doc => {

        const p = doc.data();

        produtos.push(p); // ← ADICIONE AQUI

        grid.innerHTML += `
                <div class="card">
                    <img src="${p.img || ''}" alt="${p.nome || ''}">
                    <div class="info-produto">
                        <span class="nome-produto">
                            ${p.nome || 'Sem nome'}
                        </span>
                        <span class="price-old">
                            De: ${p.precoAntigo || ''}
                        </span>
                        <br>
                        <strong>
                            Por: ${p.precoNovo || ''}
                        </strong>
                        <br>
                 <small>
                     🏪 ${p.loja || ''}
                        <br>
                     📂 ${p.categoria || ''}
                        <br>
                     🏷️ ${p.subcategoria || ''}
                        <br>
                     📷 ${p.imagensExtras ? p.imagensExtras.length : 0} extra(s)
                </small>
                    </div>
                    <div class="acoes">
                        <button
                            class="btn-editar"
                            onclick="editar('${doc.id}')">
                            Editar
                        </button>
                        <button
                            class="btn-excluir"
                            onclick="if(confirm('Excluir este produto?')) db.collection('produtos').doc('${doc.id}').delete()">
                            Excluir
                        </button>
                    </div>
                </div>`;
            });
           atualizarAnalises(produtos);
        });
    </script>
