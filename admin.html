<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin Marketplace</title>

<style>
body {
    font-family: Arial;
    background: #f2f4f8;
    margin: 0;
}

.login-box, .dashboard {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin: 10px 0;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}

button {
    padding: 10px;
    cursor: pointer;
    margin-top: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.produto {
    background: white;
    padding: 10px;
    border-radius: 10px;
}
img {
    width: 100%;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div class="login-box" id="loginBox">
    <h2>🔐 Login Admin</h2>
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
</div>

<!-- 📊 DASHBOARD -->
<div class="dashboard" id="dashboard" style="display:none;">

    <h2>📊 Dashboard Admin</h2>
    <button onclick="logout()">Sair</button>

    <div class="card">
        <h3>➕ Novo Produto</h3>

        <input id="nome" placeholder="Nome">
        <input id="precoAntigo" placeholder="Preço antigo">
        <input id="precoNovo" placeholder="Preço novo">

        <select id="categoria">
            <option value="roupas-masculinas">👕 Masculinas</option>
            <option value="roupas-femininas">👗 Femininas</option>
            <option value="plus-size">👚 Plus Size</option>
            <option value="relogios">⌚ Relógios</option>
            <option value="mae-bebe">👶 Mãe & Bebê</option>
            <option value="viagens-bagagens">🧳 Viagem</option>
            <option value="fones">🎧 Fones</option>
            <option value="bolsas-masculinas">🎒 Bolsas Masc.</option>
            <option value="bolsas-femininas">👝 Bolsas Fem.</option>
            <option value="limpeza">🧼 Limpeza</option>
            <option value="brinquedos">🧸 Brinquedos</option>
            <option value="acessorios">💎 Acessórios</option>
            <option value="pets">🐶 Pets</option>
            <option value="sapatos">👟 Sapatos</option>
            <option value="casa-construcao">🏡 Casa</option>
            <option value="beleza">💄 Beleza</option>
            <option value="papelaria">✏️ Papelaria</option>
        </select>

        <select id="loja">
            <option value="shopee">Shopee</option>
            <option value="amazon">Amazon</option>
            <option value="aliexpress">AliExpress</option>
        </select>

        <input type="file" id="imgFile">
        <input id="link" placeholder="Link afiliado">

        <button onclick="salvarProduto()">Salvar Produto</button>
    </div>

    <h3>📦 Produtos</h3>
    <div class="grid" id="lista"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJETO",
  storageBucket: "SEU_PROJETO.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let editId = null;

// 🔐 LOGIN
function login(){
    auth.signInWithEmailAndPassword(email.value, senha.value)
    .then(() => {
        loginBox.style.display = "none";
        dashboard.style.display = "block";
    })
    .catch(err => alert("Erro login"));
}

function logout(){
    auth.signOut();
    location.reload();
}

auth.onAuthStateChanged(user => {
    if(user){
        loginBox.style.display = "none";
        dashboard.style.display = "block";
    }
});

// 📤 UPLOAD IMAGEM
async function uploadImage(file){
    const ref = storage.ref("produtos/" + Date.now());
    await ref.put(file);
    return await ref.getDownloadURL();
}

// 💾 SALVAR PRODUTO
async function salvarProduto(){

    let imgUrl = "";

    if(imgFile.files[0]){
        imgUrl = await uploadImage(imgFile.files[0]);
    }

    const produto = {
        nome: nome.value,
        precoAntigo: precoAntigo.value,
        precoNovo: precoNovo.value,
        img: imgUrl,
        link: link.value,
        categoria: categoria.value,
        loja: loja.value
    };

    if(editId){
        db.collection("produtos").doc(editId).update(produto);
        editId = null;
    } else {
        db.collection("produtos").add(produto);
    }

    limpar();
}

// 🧹 LIMPAR
function limpar(){
    nome.value = "";
    precoAntigo.value = "";
    precoNovo.value = "";
    link.value = "";
    imgFile.value = "";
}

// 📦 LISTA EM TEMPO REAL
db.collection("produtos").onSnapshot(snapshot => {

    lista.innerHTML = "";

    snapshot.forEach(doc => {
        const p = doc.data();

        lista.innerHTML += `
        <div class="produto">
            <img src="${p.img}">
            <b>${p.nome}</b><br>
            💰 R$ ${p.precoNovo}<br>
            📂 ${p.categoria} | 🏪 ${p.loja}<br>

            <button onclick="editar('${doc.id}', '${p.nome}', '${p.precoAntigo}', '${p.precoNovo}', '${p.link}', '${p.categoria}', '${p.loja}')">Editar</button>
            <button onclick="deletar('${doc.id}')">Deletar</button>
        </div>
        `;
    });

});

// ✏️ EDITAR
function editar(id, nomeV, pa, pn, linkV, cat, lojaV){
    nome.value = nomeV;
    precoAntigo.value = pa;
    precoNovo.value = pn;
    link.value = linkV;
    categoria.value = cat;
    loja.value = lojaV;

    editId = id;
}

// 🗑️ DELETE
function deletar(id){
    db.collection("produtos").doc(id).delete();
}

</script>

</body>
</html>
