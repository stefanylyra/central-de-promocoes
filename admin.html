<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Admin PRO</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
}

h2,h3{
    text-align:center;
}

input, select{
    width:100%;
    padding:10px;
    margin:6px 0;
}

button{
    padding:10px;
    border:none;
    cursor:pointer;
    border-radius:6px;
    font-weight:bold;
}

.btn-salvar{
    width:100%;
    background:#cc0a12;
    color:white;
    margin-top:10px;
}

.card{
    background:#eee;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
}

.card img{
    width:80px;
    height:80px;
    object-fit:cover;
    border-radius:6px;
}

.actions button{
    margin-right:5px;
    color:white;
}

.edit{background:#f0ad4e;}
.delete{background:#d9534f;}

.msg{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
    color:green;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-box{
    background:#fff;
    padding:20px;
    width:90%;
    max-width:400px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🧠 Admin PRO</h2>

<h3>➕ Novo Produto</h3>

<input id="nome" placeholder="Nome">
<input id="img" placeholder="URL imagem">
<input id="link" placeholder="Link afiliado">
<input id="precoAntigo" placeholder="Preço antigo">
<input id="precoNovo" placeholder="Preço novo">

<select id="categoria">
<option value="">Categoria</option>
<option value="roupas-masculinas">👕 Masculinas</option>
<option value="roupas-femininas">👗 Femininas</option>
<option value="plus-size">👚 Plus Size</option>
<option value="relogios">⌚ Relógios</option>
<option value="mae-bebe">👶 Mãe & Bebê</option>
<option value="viagens-bagagens">🧳 Viagem</option>
<option value="fones">🎧 Fones</option>
<option value="bolsas-masculinas">🎒 Bolsas Masc.</option>
<option value="bolsas-femininas">👝 Bolsas Fem.</option>
<option value="limpeza">🧼 Limpeza</option>
<option value="brinquedos">🧸 Brinquedos</option>
<option value="acessorios">💎 Acessórios</option>
<option value="pets">🐶 Pets</option>
<option value="sapatos">👟 Sapatos</option>
<option value="casa-construcao">🏡 Casa</option>
<option value="beleza">💄 Beleza</option>
<option value="papelaria">✏️ Papelaria</option>
</select>

<select id="loja">
<option value="">Loja</option>
<option value="amazon">Amazon</option>
<option value="shopee">Shopee</option>
<option value="magalu">Magalu</option>
<option value="mercado-livre">Mercado Livre</option>
<option value="shein">Shein</option>
<option value="aliexpress">AliExpress</option>
</select>

<button class="btn-salvar" onclick="salvarProduto()">Salvar Produto</button>

<div class="msg" id="msg"></div>

<hr>

<h3>📦 Produtos cadastrados</h3>
<div id="lista"></div>

</div>

<!-- MODAL EDITAR -->
<div class="modal" id="modal">
<div class="modal-box">

<h3>✏️ Editar Produto</h3>

<input id="edit-nome">
<input id="edit-img">
<input id="edit-link">
<input id="edit-precoAntigo">
<input id="edit-precoNovo">

<button class="btn-salvar" onclick="salvarEdicao()">Salvar alteração</button>
<button onclick="fecharModal()">Fechar</button>

</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "central-promocoes.firebaseapp.com",
  projectId: "central-promocoes",
  storageBucket: "central-promocoes.firebasestorage.app",
  messagingSenderId: "396856047778",
  appId: "1:396856047778:web:8608a6b95f26f160d27ffb"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let editId = null;

/* ---------------- SALVAR ---------------- */
function salvarProduto(){

    db.collection("produtos").add({
        nome: nome.value,
        img: img.value,
        link: link.value,
        precoAntigo: precoAntigo.value,
        precoNovo: precoNovo.value,
        categoria: categoria.value,
        loja: loja.value,
        criadoEm: new Date()
    });

    msg.innerText = "✔ Produto salvo!";

    document.querySelectorAll("input").forEach(i => i.value = "");
    document.querySelectorAll("select").forEach(i => i.value = "");
}

/* ---------------- LISTAR EM TEMPO REAL ---------------- */
db.collection("produtos").onSnapshot(snapshot => {

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    snapshot.forEach(doc => {

        const p = doc.data();

        lista.innerHTML += `
        <div class="card">
            <img src="${p.img}"><br>

            <b>${p.nome}</b><br>
            <small>${p.categoria} | ${p.loja}</small><br>

            <div class="actions">
                <button class="edit" onclick="editar('${doc.id}', \`${p.nome}\`, \`${p.img}\`, \`${p.link}\`, \`${p.precoAntigo}\`, \`${p.precoNovo}\`)">Editar</button>
                <button class="delete" onclick="deletar('${doc.id}')">Excluir</button>
            </div>
        </div>
        `;
    });

});

/* ---------------- DELETE ---------------- */
function deletar(id){
    if(confirm("Excluir produto?")){
        db.collection("produtos").doc(id).delete();
    }
}

/* ---------------- EDITAR ---------------- */
function editar(id,nome,img,link,pa,pn){

    editId = id;

    document.getElementById("edit-nome").value = nome;
    document.getElementById("edit-img").value = img;
    document.getElementById("edit-link").value = link;
    document.getElementById("edit-precoAntigo").value = pa;
    document.getElementById("edit-precoNovo").value = pn;

    document.getElementById("modal").style.display = "flex";
}

function salvarEdicao(){

    db.collection("produtos").doc(editId).update({
        nome: edit-nome.value,
        img: edit-img.value,
        link: edit-link.value,
        precoAntigo: edit-precoAntigo.value,
        precoNovo: edit-precoNovo.value
    });

    fecharModal();
}

function fecharModal(){
    document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
