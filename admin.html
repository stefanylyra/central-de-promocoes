<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin - Central de Promoções</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
}

.hidden { display:none; }

/* LOGIN */
#login {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display:flex;
    align-items:center;
    justify-content:center;
}

.box {
    background:#111827;
    padding:20px;
    border-radius:10px;
    width:300px;
}

/* DASHBOARD */
header {
    background:#111827;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.container {
    padding:20px;
}

.card {
    background:#1f2937;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

input, select {
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    border-radius:6px;
    border:none;
}

button {
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.btn {
    background:#22c55e;
    color:black;
}

.btn-danger {
    background:#ef4444;
    color:white;
}

.grid {
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:10px;
}

.produto {
    background:#111827;
    padding:10px;
    border-radius:10px;
}
.produto img {
    width:100%;
    border-radius:8px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN OCULTO -->
<div id="login">
    <div class="box">
        <h3>🔐 Admin Login</h3>
        <input id="email" placeholder="Email">
        <input id="senha" type="password" placeholder="Senha">
        <button class="btn" onclick="login()">Entrar</button>
    </div>
</div>

<!-- 📊 DASHBOARD -->
<div id="app" class="hidden">

<header>
    <h3>🔥 Admin Panel</h3>
    <button class="btn-danger" onclick="logout()">Sair</button>
</header>

<div class="container">

    <div class="card">
        <h3>➕ Novo Produto</h3>

        <input id="id" placeholder="ID (ex: bermuda-jeans-01)">
        <input id="nome" placeholder="Nome do produto">

        <input id="img" placeholder="URL da imagem">
        <input id="link" placeholder="Link afiliado">

        <input id="precoAntigo" placeholder="Preço antigo">
        <input id="precoNovo" placeholder="Preço novo">

        <select id="categoria">
            <option value="roupas-masculinas">👕 Masculinas</option>
            <option value="roupas-femininas">👗 Femininas</option>
            <option value="plus-size">👚 Plus Size</option>
            <option value="relogios">⌚ Relógios</option>
            <option value="mae-bebe">👶 Mãe & Bebê</option>
            <option value="viagens-bagagens">🧳 Viagens</option>
            <option value="fones">🎧 Fones</option>
            <option value="bolsas-masculinas">🎒 Bolsas Masc</option>
            <option value="bolsas-femininas">👛 Bolsas Fem</option>
            <option value="limpeza">🧼 Limpeza</option>
            <option value="brinquedos">🧸 Brinquedos</option>
            <option value="acessorios">💎 Acessórios</option>
            <option value="pets">🐶 Pets</option>
            <option value="sapatos">👟 Sapatos</option>
            <option value="casa-construcao">🏡 Casa</option>
            <option value="beleza">💄 Beleza</option>
            <option value="papelaria">✏️ Papelaria</option>
        </select>

        <select id="loja">
                <option value="amazon">Amazon</option>
                <option value="shopee">Shopee</option>
                <option value="mercado-livre">Mercado Livre</option>
                <option value="shein">Shein</option>
                <option value="aliexpress">AliExpress</option>
            </select>
  <button class="btn" onclick="salvar()">Salvar Produto</button>
    </div>

    <h3>📦 Produtos</h3>
    <div class="grid" id="lista"></div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
// 🔥 FIREBASE (COLOQUE O SEU)
const firebaseConfig = {
  apiKey: "SUA_API",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJETO"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const ADMIN_EMAIL = "tete1808sd@gmail.com";

// 🔐 LOGIN
function login(){
    auth.signInWithEmailAndPassword(email.value, senha.value)
    .then(user => {
        if(user.user.email !== ADMIN_EMAIL){
            alert("Acesso negado");
            auth.signOut();
            return;
        }
        openApp();
    })
    .catch(()=> alert("Erro login"));
}

function openApp(){
    login.style.display = "none";
    app.classList.remove("hidden");
}

function logout(){
    auth.signOut();
    location.reload();
}

// 👁 AUTH STATE
auth.onAuthStateChanged(user=>{
    if(user && user.email === ADMIN_EMAIL){
        openApp();
    }
});

// 💾 SALVAR PRODUTO (FORMATO PERFEITO)
function salvar(){

    const produto = {
        id: id.value,
        nome: nome.value,
        img: img.value,
        link: link.value,
        precoAntigo: precoAntigo.value,
        precoNovo: precoNovo.value,
        categoria: categoria.value,
        loja: loja.value
    };

    db.collection("produtos").doc(produto.id).set(produto);

    alert("Produto salvo!");
}

// 📦 LISTAR
db.collection("produtos").onSnapshot(snapshot=>{
    lista.innerHTML = "";

    snapshot.forEach(doc=>{
        const p = doc.data();

        lista.innerHTML += `
        <div class="produto">
            <img src="${p.img}">
            <h4>${p.nome}</h4>
            <p>R$ ${p.precoNovo}</p>
            <small>${p.categoria}</small>
        </div>
        `;
    });
});
</script>

</body>
</html>
