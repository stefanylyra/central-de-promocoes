<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin Produtos</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
}

.container {
    max-width: 950px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}

button {
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
}

.produto {
    background: #eee;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}
</style>

</head>

<body>

<div class="container">

<h2>🛠 Painel Admin de Produtos</h2>

<input id="nome" placeholder="Nome do produto">

<input id="precoAntigo" placeholder="Preço antigo">
<input id="precoNovo" placeholder="Preço novo">

<input id="img" placeholder="URL da imagem">
<input id="link" placeholder="Link afiliado">

<select id="categoria">
    <option value="roupas-masculinas">👕 Roupas Masculinas</option>
    <option value="roupas-femininas">👗 Roupas Femininas</option>
    <option value="plus-size">👚 Plus Size</option>
    <option value="relogios">⌚ Relógios</option>
    <option value="mae-bebe">👶 Mãe & Bebê</option>
    <option value="viagens-bagagens">🧳 Viagem</option>
    <option value="fones">🎧 Fones</option>
    <option value="bolsas-masculinas">🎒 Bolsas Masculinas</option>
    <option value="bolsas-femininas">👝 Bolsas Femininas</option>
    <option value="limpeza">🧼 Limpeza</option>
    <option value="brinquedos">🧸 Brinquedos</option>
    <option value="acessorios">💎 Acessórios</option>
    <option value="pets">🐶 Pets</option>
    <option value="sapatos">👟 Sapatos</option>
    <option value="casa-construcao">🏡 Casa e construção</option>
    <option value="beleza">💄 Beleza</option>
    <option value="papelaria">✏️ Papelaria</option>
</select>

<select id="loja">
    <option value="shopee">Shopee</option>
    <option value="amazon">Amazon</option>
    <option value="aliexpress">AliExpress</option>
    <option value="mercadolivre">Mercado Livre</option>
</select>

<button onclick="salvarProduto()">💾 Salvar Produto</button>

<hr>

<h3>📦 Produtos cadastrados</h3>
<div id="lista"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// 🔥 CONFIG FIREBASE (coloque a sua)
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJETO",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let editandoId = null;

// 💾 SALVAR OU EDITAR
function salvarProduto() {

    const produto = {
        nome: nome.value,
        precoAntigo: precoAntigo.value,
        precoNovo: precoNovo.value,
        img: img.value,
        link: link.value,
        categoria: categoria.value,
        loja: loja.value
    };

    if(editandoId){
        db.collection("produtos").doc(editandoId).update(produto);
        editandoId = null;
    } else {
        db.collection("produtos").add(produto);
    }

    limparCampos();
}

// 🧹 LIMPAR CAMPOS
function limparCampos(){
    nome.value = "";
    precoAntigo.value = "";
    precoNovo.value = "";
    img.value = "";
    link.value = "";
}

// 📦 LISTAR EM TEMPO REAL
db.collection("produtos").onSnapshot(snapshot => {

    lista.innerHTML = "";

    snapshot.forEach(doc => {

        const p = doc.data();

        lista.innerHTML += `
        <div class="produto">
            <b>${p.nome}</b><br>
            💰 De: R$ ${p.precoAntigo} → Por: R$ ${p.precoNovo}<br>
            📂 ${p.categoria} | 🏪 ${p.loja}<br>

            <button onclick="editarProduto(
                '${doc.id}',
                '${p.nome}',
                '${p.precoAntigo}',
                '${p.precoNovo}',
                '${p.img}',
                '${p.link}',
                '${p.categoria}',
                '${p.loja}'
            )">✏️ Editar</button>

            <button onclick="deletarProduto('${doc.id}')">🗑️ Deletar</button>
        </div>
        `;
    });

});

// ✏️ EDITAR
function editarProduto(id, nomeP, precoAntigoP, precoNovoP, imgP, linkP, categoriaP, lojaP){

    nome.value = nomeP;
    precoAntigo.value = precoAntigoP;
    precoNovo.value = precoNovoP;
    img.value = imgP;
    link.value = linkP;
    categoria.value = categoriaP;
    loja.value = lojaP;

    editandoId = id;
}

// 🗑️ DELETAR
function deletarProduto(id){
    db.collection("produtos").doc(id).delete();
}

</script>

</body>
</html>
