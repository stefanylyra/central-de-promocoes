let categoriaAtual = "roupas-masculinas";

// Render Categorias
const nav = document.getElementById("lista-categorias");
categorias.forEach(cat => {
  const btn = document.createElement("button");
  btn.className = "bg-slate-800 hover:bg-orange-600 text-white px-5 py-2 rounded-full text-sm font-medium transition whitespace-nowrap flex-shrink-0";
  btn.textContent = cat.nome;
  btn.onclick = () => carregarCategoria(cat.id);
  nav.appendChild(btn);
});

function carregarCategoria(id) {
  categoriaAtual = id;
  const cat = dados[id];
  if (cat) renderProdutos(cat);
}

function renderProdutos(cat) {
  let html = `
    <section id="produtos-section">
      <h2 class="text-2xl md:text-3xl font-bold text-center mb-6 md:mb-8 text-slate-800">${cat.titulo}</h2>
      <div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 md:gap-6">
  `;

  cat.produtos.forEach(p => {
    const preco = p.precoNovo || "00,00";
    html += `
      <div class="card bg-white rounded-2xl overflow-hidden shadow border border-gray-100">
        <div class="relative">
          <img src="${p.img}" class="w-full h-36 sm:h-44 md:h-52 object-cover" alt="${p.nome}">
          <div onclick="toggleFavorito('${p.nome}', this)" class="absolute top-2 right-2 text-2xl cursor-pointer text-white drop-shadow-md">♡</div>
        </div>
        <div class="p-3 md:p-4">
          <h3 class="font-medium text-xs md:text-sm line-clamp-3 min-h-[48px] md:min-h-[60px]">${p.nome}</h3>
          <div class="flex items-baseline gap-2 mt-3">
            <span class="text-gray-400 line-through text-xs">R$ ${p.precoAntigo}</span>
            <span class="text-lg md:text-2xl font-bold text-red-600">R$ ${preco}</span>
          </div>
          <button onclick="window.open('${p.link}','_blank')" 
                  class="mt-4 w-full bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl font-semibold text-sm">
            Ver Oferta
          </button>
        </div>
      </div>`;
  });

  html += `</div></section>`;
  document.getElementById("conteudo").innerHTML = html;
}

// Busca (esconde hero)
const heroSection = document.getElementById("hero-section");
document.getElementById("buscaInput").addEventListener("input", e => {
  const texto = e.target.value.toLowerCase().trim();
  if (!texto) {
    heroSection.style.display = "block";
    carregarCategoria(categoriaAtual);
    return;
  }
  heroSection.style.display = "none";
  // ... (resto da busca igual ao anterior)
  let html = `<section><h2 class="text-2xl font-bold text-center mb-6">Resultados para "${texto}"</h2><div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 md:gap-6">`;
  let achou = false;

  Object.values(dados).forEach(cat => {
    cat.produtos.forEach(p => {
      if (p.nome.toLowerCase().includes(texto)) {
        achou = true;
        const preco = p.precoNovo || "00,00";
        html += ` ... `; // (mesmo card da busca anterior)
      }
    });
  });
  // ... completar a busca se precisar
  document.getElementById("conteudo").innerHTML = html;
});

function toggleFavorito(nome, el) {
  let salvos = JSON.parse(localStorage.getItem("salvos")) || [];
  if (salvos.includes(nome)) {
    salvos = salvos.filter(n => n !== nome);
    el.innerText = "♡";
  } else {
    salvos.push(nome);
    el.innerText = "❤️";
  }
  localStorage.setItem("salvos", JSON.stringify(salvos));
  document.getElementById("contador-salvos").innerText = salvos.length;
}

carregarCategoria("roupas-masculinas");
document.getElementById("contador-salvos").innerText = (JSON.parse(localStorage.getItem("salvos")) || []).length;
