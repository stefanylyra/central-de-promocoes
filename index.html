<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Promoções</title>
<link rel="icon" href="favicon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
    --cor-principal:#cc0a12;
    --cor-fundo:#f8f9fa;
    --cor-card:#fff;
    --texto:#1a1a1a;
    --muted:#707070;
    --borda:#eaeaea;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:var(--cor-fundo);color:var(--texto);display:flex;justify-content:center}

.app-container{width:100%;max-width:500px;min-height:100vh;padding-bottom:100px}

/* HEADER */
header{background:#fff;padding:16px;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--borda)}
.header-top{display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;gap:8px;text-decoration:none;align-items:center}
.logo-tag{background:var(--cor-principal);color:#fff;padding:6px 9px;border-radius:8px;font-weight:bold}

/* SEARCH */
.search-container{position:relative}
.search-container input{width:100%;padding:12px 12px 12px 40px;border-radius:25px;border:1px solid var(--borda)}
.search-container i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#888}

/* GRID */
.grid-produtos{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:16px}

.produto-card{background:#fff;border:1px solid var(--borda);border-radius:14px;padding:10px;position:relative}
.produto-img{width:100%;height:120px;object-fit:contain}
.produto-nome{font-size:13px;font-weight:600;margin:6px 0;height:34px;overflow:hidden}
.preco-antigo{text-decoration:line-through;color:#888;font-size:12px}
.preco-novo{color:var(--cor-principal);font-weight:bold}

/* FAVORITO */
.btn-favorito{position:absolute;top:10px;right:10px;background:#fff;border:none;border-radius:50%;width:28px;height:28px}
.btn-favorito.active{color:var(--cor-principal)}

/* NAV */
nav.bottom-nav{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:500px;background:var(--cor-principal);
    display:flex;justify-content:space-around;padding:10px 0
}
.nav-item{color:#fff;font-size:11px;text-align:center;background:none;border:none}

/* COOKIE */
.cookie-banner{
    position:fixed;bottom:70px;left:10px;right:10px;
    background:#fff;padding:12px;border-radius:12px;
    display:flex;justify-content:space-between;z-index:9999
}
.cookie-banner button{
    background:var(--cor-principal);color:#fff;border:none;padding:8px 12px;border-radius:8px
}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.modal-box{background:#fff;padding:20px;border-radius:12px;width:90%;max-width:400px;display:flex;flex-direction:column;gap:10px}
.modal-box input{padding:10px;border:1px solid #ddd;border-radius:8px}
.modal-box button{padding:10px;border:none;border-radius:8px;background:var(--cor-principal);color:#fff}
</style>
</head>

<body>

<div class="app-container">

<header>
<div class="header-top">
<a class="logo">
<span class="logo-tag">%</span>
<strong>Promoções</strong>
</a>
<i class="fa-solid fa-cart-shopping"></i>
</div>

<div class="search-container">
<i class="fa fa-search"></i>
<input id="busca" placeholder="Buscar..." oninput="buscar()">
</div>
</header>

<div class="grid-produtos" id="grid"></div>

</div>

<!-- NAV -->
<nav class="bottom-nav">
<button class="nav-item">Início</button>
<button class="nav-item">Ofertas</button>
<button class="nav-item">Favoritos</button>
<button class="nav-item" onclick="abrirModal()">Conta</button>
</nav>

<!-- COOKIE -->
<div id="cookie" class="cookie-banner">
<span>Usamos cookies</span>
<button onclick="aceitarCookies()">OK</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box">
<h3>Criar conta</h3>
<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">
<button onclick="criarConta()">Salvar</button>
<button onclick="fecharModal()">Fechar</button>
</div>
</div>

========================= */

];

/* =========================
   ESTADO GLOBAL
========================= */

let favoritosSalvos = [];
let categoriaAtiva = null;

/* =========================
   NAVEGAÇÃO
========================= */

function mudarAba(idAba, btn) {
    document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));

    const target = document.getElementById(`aba-${idAba}`);
    if (target) target.classList.add('active');

    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');

    const input = document.getElementById('input-busca');
    if (input) input.value = "";

    restaurarElementosEscondidos();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* =========================
   CATEGORIAS / FILTROS
========================= */

function limparFiltrosEMudarAba(btn) {
    categoriaAtiva = null;
    const titulo = document.getElementById('titulo-aba-ofertas');
    if (titulo) titulo.innerText = "🛒 Todas as Ofertas";

    renderizarGridOfertas(PRODUTOS_LOJA);
    mudarAba('ofertas', btn);
}

function filtrarPorCategoria(idCategoria) {
    categoriaAtiva = idCategoria;

    const info = CATEGORIAS_DADOS?.find(c => c.id === idCategoria);
    const titulo = document.getElementById('titulo-aba-ofertas');

    if (titulo && info) {
        titulo.innerText = `📂 ${info.nome}`;
    }

    const filtrados = PRODUTOS_LOJA.filter(p => p.categoria === idCategoria);
    renderizarGridOfertas(filtrados);

    const nav = document.querySelectorAll('.nav-item')[2];
    mudarAba('ofertas', nav);
}

/* =========================
   BUSCA
========================= */

function filtrarPesquisa() {
    const termo = document.getElementById('input-busca')?.value.toLowerCase().trim() || "";

    if (termo.length === 0) {
        restaurarElementosEscondidos();
        renderizarGridHome(PRODUTOS_LOJA);
        renderizarGridOfertas(PRODUTOS_LOJA);
        return;
    }

    const filtrados = PRODUTOS_LOJA.filter(p =>
        p.nome.toLowerCase().includes(termo)
    );

    renderizarGridHome(filtrados);
    renderizarGridOfertas(filtrados);
}

/* =========================
   FAVORITOS
========================= */

function alternarFavorito(id) {
    if (favoritosSalvos.includes(id)) {
        favoritosSalvos = favoritosSalvos.filter(i => i !== id);
    } else {
        favoritosSalvos.push(id);
    }

    atualizarIconesCoraoGlobais();
    renderizarAbaFavoritos();
}

function atualizarIconesCoraoGlobais() {
    document.querySelectorAll('.btn-favorito').forEach(btn => {
        const id = btn.getAttribute('data-id');
        const icon = btn.querySelector('i');

        if (favoritosSalvos.includes(id)) {
            btn.classList.add('active');
            if (icon) icon.className = "fa-solid fa-heart";
        } else {
            btn.classList.remove('active');
            if (icon) icon.className = "fa-regular fa-heart";
        }
    });
}

/* =========================
   RENDER PRODUTOS
========================= */

function renderizarGridHome(lista) {
    const el = document.getElementById('grid-home-ofertas');
    if (!el) return;

    if (lista.length === 0) {
        el.innerHTML = "<div>Nenhum produto encontrado</div>";
        return;
    }

    el.innerHTML = lista.slice(0, 8).map(prod => `
        <div class="produto-card">
            <button class="btn-favorito ${favoritosSalvos.includes(prod.id) ? 'active' : ''}"
                data-id="${prod.id}" onclick="alternarFavorito('${prod.id}')">
                <i class="${favoritosSalvos.includes(prod.id) ? 'fa-solid' : 'fa-regular'} fa-heart"></i>
            </button>

            <img src="${prod.img}" class="produto-img">
            <div class="produto-nome">${prod.nome}</div>

            <div class="preco-antigo">R$ ${prod.precoAntigo}</div>
            <div class="preco-novo">R$ ${prod.precoNovo}</div>

            <a href="${prod.link}" target="_blank">Ver Oferta</a>
        </div>
    `).join('');
}

function renderizarGridOfertas(lista) {
    const el = document.getElementById('grid-todas-ofertas');
    if (!el) return;

    if (lista.length === 0) {
        el.innerHTML = "<div>Nenhum produto</div>";
        return;
    }

    el.innerHTML = lista.map(prod => `
        <div class="produto-card">
            <button class="btn-favorito ${favoritosSalvos.includes(prod.id) ? 'active' : ''}"
                data-id="${prod.id}" onclick="alternarFavorito('${prod.id}')">
                <i class="${favoritosSalvos.includes(prod.id) ? 'fa-solid' : 'fa-regular'} fa-heart"></i>
            </button>

            <img src="${prod.img}" class="produto-img">
            <div class="produto-nome">${prod.nome}</div>

            <div class="preco-antigo">R$ ${prod.precoAntigo}</div>
            <div class="preco-novo">R$ ${prod.precoNovo}</div>

            <a href="${prod.link}" target="_blank">Ver Oferta</a>
        </div>
    `).join('');
}

/* =========================
   COOKIES / TEMA
========================= */

function aceitarCookies() {
    localStorage.setItem("cookiesAceitos", "sim");
    document.getElementById("cookie-banner")?.style.display = "none";
}

function alternarTema() {
    const atual = localStorage.getItem("tema-site") || "claro";

    if (atual === "claro") {
        document.body.classList.add("tema-escuro");
        localStorage.setItem("tema-site", "escuro");
    } else {
        document.body.classList.remove("tema-escuro");
        localStorage.setItem("tema-site", "claro");
    }
}

/* =========================
   CADASTRO
========================= */

function criarConta() {
    const nome = document.getElementById("nome-usuario").value.trim();
    const email = document.getElementById("email-usuario").value.trim();
    const aceitou = document.getElementById("aceitou-termos").checked;
    const promos = document.getElementById("aceitou-promocoes").checked;

    if (!nome) return alert("Digite seu nome.");
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))
        return alert("Email inválido.");
    if (!aceitou) return alert("Aceite os termos.");

    const avatar = AVATARES[Math.floor(Math.random() * AVATARES.length)];

    localStorage.setItem("usuarioNome", nome);
    localStorage.setItem("usuarioEmail", email);
    localStorage.setItem("usuarioAvatar", avatar);
    localStorage.setItem("usuarioLogado", "sim");

    db.collection("usuarios").add({
        nome,
        email,
        receberPromocoes: promos,
        dataCriacao: new Date()
    });

    carregarUsuario();
    fecharCadastro();

    alert("Conta criada!");
}

/* =========================
   USUÁRIO
========================= */

function carregarUsuario() {
    const nome = localStorage.getItem("usuarioNome");
    const avatar = localStorage.getItem("usuarioAvatar");

    if (nome) {
        const elNome = document.getElementById("nome-perfil");
        if (elNome) elNome.innerText = nome;
    }

    if (avatar) {
        const elAvatar = document.getElementById("avatar-usuario");
        if (elAvatar) elAvatar.innerText = avatar;
    }
}

function abrirCadastro() {
    document.getElementById("modal-cadastro").style.display = "flex";
}

function fecharCadastro() {
    document.getElementById("modal-cadastro").style.display = "none";
}

/* =========================
   INIT
========================= */

document.addEventListener("DOMContentLoaded", () => {
    construirEstrutura();
    carregarUsuario();
});
</script>
